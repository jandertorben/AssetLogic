// ── LOGIN SCREEN ──────────────────────────────────────────────────────────────
function LoginScreen({onLogin}){
  const [email,setEmail]=React.useState('');
  const [pw,setPw]=React.useState('');
  const [err,setErr]=React.useState('');
  function submit(e){
    e.preventDefault();
    const u=USERS_DB.find(x=>x.email===email.trim()&&x.password===pw);
    if(u){onLogin(u);}else{setErr('E-Mail oder Passwort falsch.');}
  }
  function quickLogin(u){ onLogin(u); }
  const roleColors={
    TECHNIKER:   'border-blue-500/30   bg-blue-500/10   text-blue-300   hover:bg-blue-500/20',
    SERVICELEITER:'border-purple-500/30 bg-purple-500/10 text-purple-300 hover:bg-purple-500/20',
    ADMIN:       'border-amber-500/30  bg-amber-500/10  text-amber-300  hover:bg-amber-500/20',
    CEO:         'border-red-500/30    bg-red-500/10    text-red-300    hover:bg-red-500/20',
  };
  return(
    <div className="min-h-screen flex flex-col items-center justify-center bg-[#0d0d0d] px-4 py-8">
      <div className="bg-[#1a1a1a] border border-[#2a2a2a] rounded-2xl p-8 w-full max-w-sm fade-in">
        <div className="flex flex-col items-center mb-8">
          <img src="img/aslogo.png" style={{width:'99px',height:'99px',objectFit:'contain',borderRadius:'12px'}}/>
          <div className="text-gray-500 text-xs mt-1">Asset Management Platform</div>
        </div>

        {/* Demo-Schnellauswahl */}
        <div className="mb-5">
          <div className="text-gray-500 text-xs uppercase tracking-widest mb-3 text-center">Demo — Rolle wählen</div>
          <div className="grid grid-cols-2 gap-2">
            {USERS_DB.map(u=>(
              <button key={u.id} onClick={()=>quickLogin(u)}
                className={`btn-press border rounded-xl px-3 py-3 text-left transition-all ${roleColors[u.role]||'border-gray-700 bg-gray-800 text-gray-300 hover:bg-gray-700'}`}>
                <div className="font-semibold text-sm">{u.name.split(' ')[0]} {u.name.split(' ')[1]?.[0]}.</div>
                <div className="text-xs opacity-70 mt-0.5">{getRoleLabel(u.role)}</div>
              </button>
            ))}
          </div>
        </div>

        {/* Divider */}
        <div className="flex items-center gap-3 mb-5">
          <div className="flex-1 h-px bg-[#2a2a2a]"/>
          <span className="text-gray-600 text-xs">oder manuell</span>
          <div className="flex-1 h-px bg-[#2a2a2a]"/>
        </div>

        <form onSubmit={submit} className="space-y-3">
          <input value={email} onChange={e=>{setEmail(e.target.value);setErr('');}} type="email" placeholder="E-Mail" autoComplete="username"
            className="w-full bg-[#111] border border-[#2a2a2a] rounded-xl px-4 py-3 text-white text-sm focus:outline-none focus:border-[#2979FF] focus:ring-1 focus:ring-[#2979FF]/30"/>
          <input value={pw} onChange={e=>{setPw(e.target.value);setErr('');}} type="password" placeholder="Passwort" autoComplete="current-password"
            className="w-full bg-[#111] border border-[#2a2a2a] rounded-xl px-4 py-3 text-white text-sm focus:outline-none focus:border-[#2979FF] focus:ring-1 focus:ring-[#2979FF]/30"/>
          {err&&<div className="text-red-400 text-xs">{err}</div>}
          <button type="submit" className="btn-press bg-[#2979FF] hover:bg-blue-700 text-white rounded-xl py-3 font-semibold w-full transition-colors text-sm">
            Anmelden
          </button>
        </form>
      </div>
    </div>
  );
}

// ── SCAN MODAL ────────────────────────────────────────────────────────────────

            <div className="absolute top-0 right-0 w-10 h-10 border-t-4 border-r-4 border-[#2979FF] rounded-tr-xl"/>
            <div className="absolute bottom-0 left-0 w-10 h-10 border-b-4 border-l-4 border-[#2979FF] rounded-bl-xl"/>

            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#22c55e" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <div>
            <div className="text-white font-bold text-xl mb-1">Asset erkannt!</div>
            <div className="text-gray-400 text-sm">Liebherr R 920</div>
            <div className="text-gray-600 text-xs mt-1">ID: LB-920 · Außengelände Ost</div>
          </div>
          <div className="bg-amber-500/20 border border-amber-500/30 rounded-xl px-4 py-2 text-amber-400 text-sm">

          </div>

function MobileProfil({user,onLogout,onNavigate}){
  const [notif,setNotif]=React.useState(true);
  const [dark,setDark]=React.useState(true);
  const [showUrlaub,setShowUrlaub]=React.useState(false);
  const [showOvertime,setShowOvertime]=React.useState(false);
  // vacation modal state
  const [pickerYear,setPickerYear]=React.useState(2026);
  const [pickerMonth,setPickerMonth]=React.useState(2);
  const [fromDate,setFromDate]=React.useState(null);
  const [toDate,setToDate]=React.useState(null);
  const [submitState,setSubmitState]=React.useState('idle'); // idle|loading|success

  const myDone=_globalOrders.filter(o=>o.techId===user.techId&&o.status==='ABGESCHLOSSEN').length;
  const myActive=_globalOrders.filter(o=>o.techId===user.techId&&o.status!=='ABGESCHLOSSEN').length;

  const MONTH_NAMES=['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
  const DOW=['Mo','Di','Mi','Do','Fr','Sa','So'];

  function buildCal(y,m){
    const first=new Date(y,m,1),last=new Date(y,m+1,0);
    let dow=first.getDay();dow=dow===0?6:dow-1;
    const days=[];
    for(let i=0;i<dow;i++) days.push(null);
    for(let i=1;i<=last.getDate();i++) days.push(new Date(y,m,i));
    while(days.length%7!==0) days.push(null);
    return days;
  }

  function toISO(d){
    if(!d)return null;
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function fmtShort(iso){
    if(!iso)return'–';
    const d=new Date(iso+'T00:00:00');
    return d.toLocaleDateString('de-DE',{day:'2-digit',month:'short'});
  }

  function countDays(f,t){
    if(!f||!t)return 0;
    const diff=(new Date(t+'T00:00:00')-new Date(f+'T00:00:00'))/(1000*60*60*24);
    return Math.round(diff)+1;
  }

  function handleDayTap(d){
    if(!d)return;
    const iso=toISO(d);
    if(!fromDate||(fromDate&&toDate)){setFromDate(iso);setToDate(null);}
    else if(iso<fromDate){setFromDate(iso);setToDate(fromDate);}
    else if(iso===fromDate){setFromDate(null);}
    else{setToDate(iso);}
  }

  function inRange(d){
    if(!d||!fromDate||!toDate)return false;
    const iso=toISO(d);return iso>fromDate&&iso<toDate;
  }
  function isFrom(d){return d&&toISO(d)===fromDate;}
  function isTo(d){return d&&toISO(d)===toDate;}

  function openUrlaub(){setShowUrlaub(true);setFromDate(null);setToDate(null);setSubmitState('idle');setPickerYear(2026);setPickerMonth(2);}

  function handleSubmit(){
    if(submitState!=='idle'||!fromDate||!toDate)return;
    setSubmitState('loading');
    setTimeout(()=>setSubmitState('success'),1900);
  }

  function isPast(d){
    if(!d)return false;
    const today=new Date(2026,2,14);
    return d<today;
  }

  const calDays=buildCal(pickerYear,pickerMonth);
  const dayCount=countDays(fromDate,toDate);

  return(
    <div className="page-enter px-5 pt-8 pb-28 space-y-6">

      {/* Avatar + name */}
      <div className="flex flex-col items-center gap-3">
        <div className="w-20 h-20 rounded-full bg-[#2979FF]/20 flex items-center justify-center text-[#2979FF] font-bold text-2xl">{user.initials}</div>
        <div className="text-center">
          <div className="text-white font-bold text-lg">{user.name}</div>
          <span className={`text-xs font-medium px-3 py-1 rounded-full mt-1 inline-block ${getRoleColor(user.role)}`}>{getRoleLabel(user.role)}</span>
          <div className="text-gray-500 text-sm mt-1">{user.email}</div>
        </div>
      </div>

      {/* Stats */}
      <div className="bg-mob-card border border-mob-border rounded-2xl p-4">
        <div className="text-gray-400 text-xs uppercase tracking-wider mb-3">Meine Statistiken</div>
        <div className="grid grid-cols-2 gap-3">
          <button onClick={()=>onNavigate&&onNavigate('auftraege')}
            className="btn-press text-center bg-green-500/5 border border-green-500/20 rounded-xl p-3 transition-all hover:bg-green-500/10">
            <div className="text-green-400 text-2xl font-bold">{myDone}</div>
            <div className="text-gray-500 text-xs">Abgeschlossen</div>
            <div className="text-green-600 text-xs mt-0.5">→ Details</div>
          </button>
          <button onClick={()=>onNavigate&&onNavigate('auftraege')}
            className="btn-press text-center bg-amber-500/5 border border-amber-500/20 rounded-xl p-3 transition-all hover:bg-amber-500/10">
            <div className="text-amber-400 text-2xl font-bold">{myActive}</div>
            <div className="text-gray-500 text-xs">Aktiv</div>
            <div className="text-amber-600 text-xs mt-0.5">→ Details</div>
          </button>
        </div>
      </div>

      {/* ── Meine Zeit ── */}
      <div className="bg-mob-card border border-mob-border rounded-2xl p-4">
        <div className="text-gray-400 text-xs uppercase tracking-wider mb-3">Meine Zeit</div>
        <div className="grid grid-cols-2 gap-3">

          {/* Urlaub planen */}
          <button onClick={openUrlaub}
            className="btn-press text-left rounded-2xl p-4 transition-all active:scale-95"
            style={{background:'rgba(34,197,94,0.06)',border:'1px solid rgba(34,197,94,0.2)'}}>
            <div style={{fontSize:'22px',marginBottom:'6px'}}>🏖️</div>
            <div style={{fontSize:'13px',fontWeight:700,color:'#fff',lineHeight:1.2}}>Urlaub planen</div>

            <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:'2px'}}>
              {calDays.map((d,i)=>{
                if(!d) return <div key={i}/>;

                const from=isFrom(d);
                const to=isTo(d);
                const mid=inRange(d);

                return(
                  <button key={i} onClick={()=>!past&&handleDayTap(d)}
                    style={{
                      padding:'0',height:'42px',borderRadius:'10px',border:'none',cursor:past?'default':'pointer',
                      background:sel?'#16a34a':mid?'rgba(34,197,94,0.15)':'transparent',

          <div style={{padding:'8px 20px 36px'}}>

                <span style={{width:'18px',height:'18px',border:'2px solid rgba(34,197,94,0.3)',borderTopColor:'#4ade80',borderRadius:'50%',display:'inline-block',animation:'erpSpinner 0.75s linear infinite',flexShrink:0}}/>
                <span style={{fontSize:'14px',fontWeight:600,color:'#4ade80'}}>KI prüft Kapazitäten…</span>

            {submitState==='success'&&(
              <div style={{width:'100%',padding:'18px 16px',borderRadius:'14px',background:'rgba(34,197,94,0.1)',border:'1px solid rgba(34,197,94,0.25)',textAlign:'center',animation:'fadeIn 0.35s ease-out'}}>
                <div style={{fontSize:'32px',marginBottom:'6px',filter:'drop-shadow(0 0 12px rgba(34,197,94,0.6))'}}>✅</div>
                <div style={{fontSize:'16px',fontWeight:700,color:'#4ade80',marginBottom:'3px'}}>Antrag eingereicht!</div>
                <div style={{fontSize:'12px',color:'#64748b',marginBottom:'14px'}}>

                <div style={{background:'rgba(0,0,0,0.3)',borderRadius:'8px',padding:'9px 12px',fontSize:'11px',color:'#64748b',lineHeight:1.6,textAlign:'left',borderLeft:'2px solid rgba(34,197,94,0.4)',marginBottom:'14px'}}>

                </div>
                <button onClick={()=>setShowUrlaub(false)}
                  style={{width:'100%',padding:'12px',borderRadius:'11px',border:'1px solid rgba(34,197,94,0.25)',background:'rgba(34,197,94,0.08)',color:'#4ade80',fontSize:'13px',fontWeight:600,cursor:'pointer',fontFamily:'Inter,sans-serif'}}>
                  Schließen
                </button>
              </div>
            )}
          </div>
        </div>
      </>)}
    </div>
  );
}

// ── SCAN FAB (draggable, snap-to-side, position memory) ───────────────────────
function ScanFAB({onPress}){
  const STORAGE_KEY='fieldfix_fab_side';
  const [side,setSide]=React.useState(()=>localStorage.getItem(STORAGE_KEY)||'right');
  const [dragging,setDragging]=React.useState(false);
  const [pulse,setPulse]=React.useState(true);
  const fabRef=React.useRef(null);
  const dragState=React.useRef({active:false,startX:0,startY:0,moved:false});

  // stop pulse after 4s (draw attention on first open, then calm down)
  React.useEffect(()=>{const t=setTimeout(()=>setPulse(false),4000);return()=>clearTimeout(t);},[]);

  function startDrag(e){
    const cx=e.touches?e.touches[0].clientX:e.clientX;
    const cy=e.touches?e.touches[0].clientY:e.clientY;
    dragState.current={active:true,startX:cx,startY:cy,moved:false};
    setDragging(true);
  }
  function onDrag(e){
    if(!dragState.current.active)return;
    const cx=e.touches?e.touches[0].clientX:e.clientX;
    const dx=Math.abs(cx-dragState.current.startX);
    const dy=Math.abs((e.touches?e.touches[0].clientY:e.clientY)-dragState.current.startY);
    if(dx>8||dy>8) dragState.current.moved=true;
    if(dragState.current.moved){
      const newSide=cx<window.innerWidth/2?'left':'right';
      setSide(newSide);
    }
  }
  function endDrag(e){
    if(!dragState.current.active)return;
    dragState.current.active=false;
    setDragging(false);
    if(!dragState.current.moved){
      // it was a tap, not a drag → open scan
      onPress();
    } else {
      // save side preference
      localStorage.setItem(STORAGE_KEY,side);
    }
  }

  const baseStyle={
    position:'fixed',
    bottom:'90px',
    [side==='right'?'right':'left']:'16px',
    zIndex:60,
    width:'72px',
    height:'72px',
    borderRadius:'50%',
    background:'linear-gradient(135deg,#2979FF 0%,#1565c0 100%)',
    border:'none',
    cursor:dragging?'grabbing':'grab',
    display:'flex',alignItems:'center',justifyContent:'center',
    boxShadow:'0 4px 24px rgba(41,121,255,0.55), 0 1px 4px rgba(0,0,0,0.4)',
    transition:dragging?'none':'right 0.3s cubic-bezier(.34,1.56,.64,1), left 0.3s cubic-bezier(.34,1.56,.64,1), box-shadow 0.2s',
    userSelect:'none',
    WebkitUserSelect:'none',
    touchAction:'none',
  };

  return(
    <div style={{position:'fixed',inset:0,pointerEvents:'none',zIndex:60}}>
      {/* pulse ring */}
      {pulse&&(
        <div style={{
          position:'fixed',
          bottom:'90px',
          [side==='right'?'right':'left']:'16px',
          width:'72px',height:'72px',borderRadius:'50%',
          border:'2px solid rgba(41,121,255,0.6)',
          animation:'fabPulse 1.2s ease-out infinite',
          pointerEvents:'none',
          zIndex:59,
        }}/>
      )}
      <button
        ref={fabRef}
        style={{...baseStyle,pointerEvents:'all'}}
        onMouseDown={startDrag}
        onMouseMove={onDrag}
        onMouseUp={endDrag}
        onTouchStart={startDrag}
        onTouchMove={onDrag}
        onTouchEnd={endDrag}
        aria-label="Maschine scannen"
      >
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <rect x="3" y="3" width="5" height="5" rx="1"/><rect x="16" y="3" width="5" height="5" rx="1"/><rect x="3" y="16" width="5" height="5" rx="1"/>
          <line x1="11" y1="3" x2="11" y2="8"/><line x1="3" y1="11" x2="21" y2="11"/><line x1="13" y1="3" x2="21" y2="3"/>
          <line x1="21" y1="8" x2="21" y2="16"/><line x1="13" y1="21" x2="21" y2="21"/><line x1="16" y1="13" x2="16" y2="16"/>
          <rect x="13" y="16" width="4" height="5" rx="1"/>
        </svg>
        {/* drag hint indicator */}
        <div style={{
          position:'absolute',top:'-6px',left:'50%',transform:'translateX(-50%)',
          width:'20px',height:'3px',borderRadius:'2px',background:'rgba(255,255,255,0.3)'
        }}/>
      </button>
      {/* drag hint tooltip (first 4s) */}
      {pulse&&(
        <div style={{
          position:'fixed',
          bottom:'170px',
          [side==='right'?'right':'left']:'8px',
          background:'rgba(30,30,40,0.95)',
          border:'1px solid rgba(41,121,255,0.3)',
          borderRadius:'10px',
          padding:'6px 12px',
          fontSize:'11px',
          color:'#aaa',
          whiteSpace:'nowrap',
          pointerEvents:'none',
          zIndex:61,
          animation:'fadeIn 0.3s ease',
        }}>↔ Ziehen zum Wechseln der Seite</div>
      )}
    </div>
  );
}

}

              {/* Submit */}
              <div>
                <button onClick={submitNew} disabled={!form.title||!form.asset||sent}

                </button>

}

function ErpBridgeCard({ techNote, geofenceTime, assetId }) {
  const note    = techNote     || 'Lüfter defekt, Garantie prüfen';
  const geoTime = geofenceTime || '2h 14min (seit 08:43 Uhr)';
  const asset   = assetId      || 'CAT-320';

  const [billingType, setBillingType] = React.useState('rechnung');
  const [aw,          setAw]          = React.useState('3.5');
  const [arbeit,      setArbeit]      = React.useState('245,00 €');
  const [matFree,     setMatFree]     = React.useState(false);
  const [matAmount,   setMatAmount]   = React.useState('89,50 €');
  const [btnState,    setBtnState]    = React.useState('idle');

  const FREE_TYPES = ['garantie', 'kulanz'];

  function onBillingChange(e) {
    const val = e.target.value;
    setBillingType(val);
    if (FREE_TYPES.includes(val)) {
      setArbeit('0,00 €'); setMatAmount('0,00 €'); setMatFree(true);
    } else {
      setArbeit('245,00 €'); setMatAmount('89,50 €'); setMatFree(false);
    }
  }

  function onAwChange(e) {
    const raw = parseFloat(e.target.value.replace(',', '.')) || 0;
    setAw(e.target.value);
    if (!FREE_TYPES.includes(billingType)) {
      setArbeit((raw * 70).toFixed(2).replace('.', ',') + ' €');
    }
  }

  function onMatToggle(e) {
    setMatFree(e.target.checked);
    setMatAmount(e.target.checked ? '0,00 €' : '89,50 €');
  }

  function onRelease() {
    if (btnState !== 'idle') return;
    setBtnState('loading');
    setTimeout(() => {
      setBtnState('success');
      triggerErpSync('online');
      setTimeout(() => setBtnState('idle'), 2200);
    }, 1800);
  }

  const billingClass = `erp-billing-${billingType}`;
  const isZeroed     = FREE_TYPES.includes(billingType);

  return (
    <div className="erp-bridge-card">
      <div className="erp-bridge-header">
        <div className="erp-bridge-header-icon">🔗</div>
        <div><div className="erp-bridge-header-title">KI-ERP Bridge</div></div>
        <div className="erp-bridge-header-badge">AUTO-BILLING</div>
      </div>
      <div className="erp-bridge-body">
        <div>
          <div className="erp-raw-label">Rohdaten vom Einsatz</div>
          <div className="erp-raw-section">
            <div className="erp-raw-row"><span className="erp-raw-key">asset_id   </span><span className="erp-raw-val">{asset}</span></div>
            <div className="erp-raw-row"><span className="erp-raw-key">tech_note  </span><span className="erp-raw-val">"{note}"</span></div>
            <div className="erp-raw-row"><span className="erp-raw-key">geo_time   </span><span className="erp-raw-val time">{geoTime}</span></div>
          </div>
        </div>
        <div className="erp-divider"><span>Abrechnung konfigurieren</span></div>
        <div className={`erp-form-grid ${billingClass}`}>
          <div className="erp-form-group full">
            <label className="erp-form-label">Abrechnungs-Typ</label>
            <select className="erp-select" value={billingType} onChange={onBillingChange}>
              <option value="rechnung">💶  Rechnung (Standard)</option>
              <option value="garantie">🛡️  Garantie</option>
              <option value="kulanz">🤝  Kulanz</option>
              <option value="wartung">🔧  Wartung (Vertrag)</option>
            </select>
          </div>
          <div className="erp-form-group">
            <label className="erp-form-label">Arbeitswerte (AW)</label>
            <input className="erp-input" type="number" step="0.5" min="0" value={aw} onChange={onAwChange}/>
          </div>
          <div className="erp-form-group">
            <label className="erp-form-label">Betrag Arbeit</label>
            <input className={`erp-input${isZeroed?' zeroed':''}`} value={arbeit} onChange={e=>setArbeit(e.target.value)} readOnly={isZeroed}/>
          </div>
        </div>
        <div>
          <div className="erp-form-label" style={{marginBottom:'7px'}}>Material-Status</div>
          <div className="erp-material-row">
            <div className="erp-mat-label"><strong>Ersatzteile / Material</strong>Inkl. verbauter Teile aus Einsatz</div>
            <label className="erp-toggle-wrap" title="Kostenlos / Garantie">
              <input type="checkbox" checked={matFree} onChange={onMatToggle}/>
              <span className="erp-toggle-slider"/>
            </label>
            <span style={{fontSize:'10px',color:'#475569',minWidth:'52px',textAlign:'center'}}>
              {matFree?<span style={{color:'#818cf8',fontWeight:600}}>Kostenlos</span>:'Berechnen'}
            </span>
            <input className={`erp-input erp-mat-amount${matFree?' zeroed':''}`} value={matAmount} onChange={e=>setMatAmount(e.target.value)} readOnly={matFree}/>
          </div>
        </div>
        <button
          className={`erp-release-btn${btnState==='loading'?' loading':''}${btnState==='success'?' success':''}`}
          onClick={onRelease} disabled={btnState==='loading'}>
          {btnState==='idle'&&<><span>⚡</span> Freigabe für ERP</>}
          {btnState==='loading'&&<><span className="erp-btn-spinner"/><span>Synchronisiere mit ERP…</span></>}
          {btnState==='success'&&<><span className="erp-success-icon">✓</span><span>Erfolgreich übertragen</span></>}
        </button>
      </div>
    </div>
  );
}

    </div>
  );
}

// ── BILLING SLIDE-OVER ────────────────────────────────────────────────────────
function BillingSlideOver({mission:m, onClose}){
  const [billingType,setBillingType]=React.useState(m.ki.type);
  const [btnState,setBtnState]=React.useState('idle');
  const [showInvoice,setShowInvoice]=React.useState(false);
  const FREE=['garantie','kulanz'];
  const isF=FREE.includes(billingType);
  const fmt=v=>v.toFixed(2).replace('.',',')+' €';
  const laborRaw=m.ki.hours*70;
  const travelRaw=m.ki.travel*0.5;
  const partsRaw=m.ki.partsCost;
  const laborAmt=isF?'0,00 €':fmt(laborRaw);
  const travelAmt=isF?'0,00 €':fmt(travelRaw);
  const partsAmt=isF?'0,00 €':fmt(partsRaw);
  const confColor=m.ki.confidence>=80?'#4ade80':m.ki.confidence>=60?'#fbbf24':'#f87171';

  function onTransfer(){
    if(btnState!=='idle')return;
    setBtnState('loading');
    setTimeout(()=>{
      setBtnState('success');
      triggerErpSync('online');
      m.status='transferred';
      setTimeout(()=>{setBtnState('idle');onClose();},1800);
    },1800);
  }

  return(
    <div className="bc-slideover">
      {/* Header */}
      <div className="bc-slideover-header">
        <div className="flex items-start justify-between">
          <div>
            <div className="flex items-center gap-2.5 mb-2">
              <span className="font-mono text-xs text-gray-600">{m.id}</span>
              {m.status==='ki-ready'
                ?<span className="bc-badge-ki">⚡ KI-Vorschlag bereit</span>
                :<span className="bc-badge-review">⚠ Prüfung nötig</span>}
            </div>
            <div className="text-white font-bold text-lg leading-tight">{m.asset}</div>
            <div className="text-gray-500 text-sm mt-0.5">{m.techName} · {m.date} · {m.duration}h</div>
          </div>
          <button onClick={onClose} className="w-8 h-8 rounded-lg bg-white/5 border border-white/10 flex items-center justify-center text-gray-400 hover:text-white hover:bg-white/10 transition-all flex-shrink-0 ml-4">
            <IconX size={16}/>
          </button>
        </div>
      </div>

      {/* Body */}
      <div className="bc-slideover-body">
        {/* Techniker-Bericht */}
        <div className="bc-report-box">
          <div className="rbl">Techniker-Bericht (Original)</div>
          "{m.note}"
        </div>

        {/* KI-Analyse */}
        <div className="bc-ki-card">
          <div className="bc-ki-label">
            <span className="bc-ki-tag">KI</span>
            Extrahierte Abrechnungsfelder
          </div>
          <div className="bc-ki-grid">
            <div className="bc-ki-field" style={{gridColumn:'1/-1'}}>
              <div className="fk">Abrechnungs-Typ</div>
              <select className="erp-select" style={{marginTop:'6px'}} value={billingType} onChange={e=>setBillingType(e.target.value)}>
                <option value="rechnung">💶  Rechnung (Standard)</option>
                <option value="garantie">🛡️  Garantie</option>
                <option value="kulanz">🤝  Kulanz</option>
                <option value="wartung">🔧  Wartung (Vertrag)</option>
              </select>
            </div>
            <div className="bc-ki-field">
              <div className="fk">Arbeitsstunden</div>
              <div className="fv">{m.ki.hours} h</div>
            </div>
            <div className="bc-ki-field">
              <div className="fk">Betrag Arbeit</div>
              <div className={`fv ${isF?'col-garantie':''}`}>{laborAmt}</div>
            </div>
            <div className="bc-ki-field">
              <div className="fk">Anfahrt</div>
              <div className="fv">{m.ki.travel} min</div>
            </div>
            <div className="bc-ki-field">
              <div className="fk">Anfahrtskosten</div>
              <div className={`fv ${isF?'col-garantie':''}`}>{travelAmt}</div>
            </div>
            <div className="bc-ki-field" style={{gridColumn:'1/-1'}}>
              <div className="fk">Material / Ersatzteile</div>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginTop:'3px'}}>
                <div style={{fontSize:'12px',color:'#94a3b8'}}>{m.ki.parts}</div>
                <div className={`fv ${isF?'col-garantie':''}`}>{partsAmt}</div>
              </div>
            </div>
          </div>
          {/* Confidence */}
          <div className="bc-confidence">
            <span style={{fontSize:'10px',color:'#475569',fontWeight:600,minWidth:'76px',letterSpacing:'0.5px'}}>KI-KONFIDENZ</span>
            <div className="bc-confidence-bar">
              <div className="bc-confidence-fill" style={{width:`${m.ki.confidence}%`,background:confColor}}/>
            </div>
            <span style={{fontSize:'12px',fontWeight:700,color:confColor,minWidth:'36px',textAlign:'right'}}>{m.ki.confidence}%</span>
          </div>
          <div className="bc-reasoning">💬 {m.ki.reasoning}</div>
        </div>

        {/* Vorschau + Transfer */}
        <button className="bc-preview-btn" onClick={()=>setShowInvoice(true)}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          Rechnungs-Vorschau
        </button>

        <button className={`bc-transfer-btn${btnState==='success'?' success':''}`} onClick={onTransfer} disabled={btnState==='loading'}>
          {btnState==='idle'&&<>⚡ An ERP übertragen</>}
          {btnState==='loading'&&<><span className="erp-btn-spinner"/>Überträgt an ERP…</>}
          {btnState==='success'&&<>✓ Erfolgreich übertragen</>}
        </button>
        <div style={{height:'4px'}}/>
      </div>

      {/* Invoice Preview Modal */}
      {showInvoice&&(
        <InvoicePreviewModal
          mission={m}
          billingType={billingType}
          laborRaw={laborRaw}
          travelRaw={travelRaw}
          partsRaw={partsRaw}
          onClose={()=>setShowInvoice(false)}
          onCloseAll={()=>{setShowInvoice(false);onClose();}}
        />
      )}
    </div>
  );
}

        ].map(({l,v,c})=>(
          <div key={l} className="bg-desk-surface border border-desk-border rounded-xl p-4">
            <div className={`text-2xl font-bold ${c} mb-1`}>{v}</div>

      <div className="bg-desk-surface border border-desk-border rounded-xl overflow-hidden">

          <div className="text-white font-semibold">Garantie & Kulanz Fälle</div>
          <div className="text-gray-500 text-xs mt-0.5">Einsätze mit Kostenerlass – klicken zum Öffnen</div>
        </div>
        <div className="divide-y divide-desk-border">
          {items.map(m=>(
            <div key={m.id} onClick={()=>onOpenSlideOver(m)}
              className="px-5 py-4 flex items-start gap-4 cursor-pointer hover:bg-white/[0.025] transition-colors">
              <div className={`w-9 h-9 rounded-xl flex items-center justify-center flex-shrink-0 text-base ${m.ki.type==='garantie'?'bg-[rgba(99,102,241,0.15)]':'bg-[rgba(245,158,11,0.12)]'}`}>
                {m.ki.type==='garantie'?'🛡':'🤝'}
              </div>
              <div className="flex-1 min-w-0">
                <div className="flex items-center gap-2 mb-0.5">
                  <span className="text-white font-medium text-sm">{m.asset}</span>
                  <span className={`bc-type-chip bc-type-${m.ki.type}`}>{m.ki.type==='garantie'?'Garantie':'Kulanz'}</span>
                </div>
                <div className="text-gray-500 text-xs">{m.techName} · {m.date}</div>
                <div className="text-gray-500 text-xs mt-1 truncate italic">{m.ki.reasoning}</div>
              </div>
              <div className="text-right flex-shrink-0">
                <div className="text-[#818cf8] font-bold text-sm">0,00 €</div>
                <div className="text-gray-600 text-xs mt-0.5">{m.ki.confidence}% KI</div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── ARCHIV & HISTORIE PAGE ────────────────────────────────────────────────────
// ── Resource Planning: Urlaubs-Dashboard ─────────────────────────────────────
function UrlaubsDashboardPage(){
  const [requests,setRequests]=React.useState(VACATION_REQUESTS.map(r=>({...r})));
  const [viewMode,setViewMode]=React.useState('list'); // 'list' | 'calendar'
  const [calYear,setCalYear]=React.useState(2026);
  const [calMonth,setCalMonth]=React.useState(2); // 0-indexed; 2=März
  const [selected,setSelected]=React.useState(null);       // single request (list click)
  const [daySlide,setDaySlide]=React.useState(null);        // {date, label, vacations, deployments}
  const [approveState,setApproveState]=React.useState('idle');
  const [confettiPieces,setConfettiPieces]=React.useState([]);

  const MONTH_NAMES=['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
  const DOW=['Mo','Di','Mi','Do','Fr','Sa','So'];

  const pendingCount=requests.filter(r=>r.status==='pending').length;
  const activeToday=DEPLOYMENT_EVENTS.filter(e=>{
    const t=new Date(2026,2,14).getTime();
    return t>=new Date(e.from).getTime()&&t<=new Date(e.to).getTime();
  }).length;
  const availPct=Math.round((requests.filter(r=>r.status!=='approved').length/requests.length)*100);

  const fmtDate=s=>{
    const d=new Date(s+'T00:00:00');
    return d.toLocaleDateString('de-DE',{day:'2-digit',month:'short',year:'numeric'});
  };
  const fmtDateShort=s=>{
    const d=new Date(s+'T00:00:00');
    return d.toLocaleDateString('de-DE',{day:'2-digit',month:'short'});
  };

  const roleLabelMap={TECHNIKER:'Techniker',MCU:'MCU',ADMIN:'Admin'};
  const roleChipMap={TECHNIKER:'techniker',MCU:'mcu',ADMIN:'admin'};
  const statusLabel={pending:'Offen',approved:'Genehmigt',review:'Rücksprache'};
  const statusChipCls={pending:'pending',approved:'approved',review:'review'};

  function launchConfetti(){
    const colors=['#6366f1','#10b981','#fbbf24','#f472b6','#60a5fa','#34d399'];
    const pieces=Array.from({length:22},(_,i)=>({
      id:i,color:colors[i%colors.length],
      left:Math.random()*90+5,delay:Math.random()*0.4,rotate:Math.random()*360,
    }));
    setConfettiPieces(pieces);
    setTimeout(()=>setConfettiPieces([]),1200);
  }

  function handleApprove(req,setter){
    if(approveState!=='idle')return;
    setApproveState('loading');
    setTimeout(()=>{
      setApproveState('success');
      launchConfetti();
      setRequests(prev=>prev.map(r=>r.id===req.id?{...r,status:'approved'}:r));
      setter(s=>({...s,status:'approved'}));
      setTimeout(()=>{setApproveState('idle');setter(null);},2000);
    },1200);
  }

  function handleChat(req,setter){
    setRequests(prev=>prev.map(r=>r.id===req.id?{...r,status:'review'}:r));
    setter(null);
  }

  // ── Calendar helpers ──────────────────────────────────────
  function buildCalendar(year,month){
    const firstDay=new Date(year,month,1);
    const lastDay=new Date(year,month+1,0);
    let startDow=firstDay.getDay(); // 0=Sun
    startDow=startDow===0?6:startDow-1; // Mon=0
    const days=[];
    for(let i=0;i<startDow;i++){
      days.push({date:new Date(year,month,1-(startDow-i)),inMonth:false});
    }
    for(let i=1;i<=lastDay.getDate();i++){
      days.push({date:new Date(year,month,i),inMonth:true});
    }
    const rem=7-(days.length%7);
    if(rem<7){for(let i=1;i<=rem;i++) days.push({date:new Date(year,month+1,i),inMonth:false});}
    return days;
  }

  function dateInRange(d,from,to){
    const dt=new Date(d.getFullYear(),d.getMonth(),d.getDate()).getTime();
    const f=new Date(from+'T00:00:00').getTime();
    const t=new Date(to+'T00:00:00').getTime();
    return dt>=f&&dt<=t;
  }

  function getDayItems(date){
    const vacations=requests.filter(r=>dateInRange(date,r.from,r.to));
    const deployments=DEPLOYMENT_EVENTS.filter(e=>dateInRange(date,e.from,e.to));
    return {vacations,deployments};
  }

  function isToday(date){
    return date.getFullYear()===2026&&date.getMonth()===2&&date.getDate()===14;
  }

  function prevMonth(){
    if(calMonth===0){setCalMonth(11);setCalYear(y=>y-1);}
    else setCalMonth(m=>m-1);
  }
  function nextMonth(){
    if(calMonth===11){setCalMonth(0);setCalYear(y=>y+1);}
    else setCalMonth(m=>m+1);
  }

  function openDaySlide(day){
    const {vacations,deployments}=getDayItems(day.date);
    if(!vacations.length&&!deployments.length)return;
    const label=day.date.toLocaleDateString('de-DE',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});
    setDaySlide({date:day.date,label,vacations,deployments});
    setApproveState('idle');
  }

  const calDays=buildCalendar(calYear,calMonth);

  // ── Shared slide-over body renderer ──────────────────────
  function SlideOverSingleRequest({req,onClose}){
    return(<>
      {/* Confetti */}
      {confettiPieces.length>0&&(
        <div style={{position:'absolute',inset:0,pointerEvents:'none',overflow:'hidden',zIndex:10}}>
          {confettiPieces.map(p=>(
            <div key={p.id} className="confetti-piece" style={{left:`${p.left}%`,top:0,background:p.color,animationDelay:`${p.delay}s`,transform:`rotate(${p.rotate}deg)`}}/>
          ))}
        </div>
      )}
      <div className="rp-slideover-header">
        <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between'}}>
          <div>
            <div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'8px'}}>
              <span style={{fontSize:'11px',fontFamily:"'JetBrains Mono',monospace",color:'#475569'}}>{req.id}</span>
              <span className={`rp-status-chip ${statusChipCls[req.status]}`}>{statusLabel[req.status]}</span>
            </div>
            <div style={{fontSize:'16px',fontWeight:700,color:'#fff'}}>{req.name}</div>
            <div style={{fontSize:'12px',color:'#64748b',marginTop:'2px'}}>
              {fmtDate(req.from)} – {fmtDate(req.to)} · {req.days} Tage · <span className={`rp-role-chip ${roleChipMap[req.role]}`}>{roleLabelMap[req.role]}</span>
            </div>
          </div>
          <button onClick={onClose} style={{width:'32px',height:'32px',borderRadius:'8px',background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.08)',display:'flex',alignItems:'center',justifyContent:'center',color:'#94a3b8',cursor:'pointer',flexShrink:0,marginLeft:'12px'}}>
            <IconX size={15}/>
          </button>
        </div>
      </div>
      <div className="rp-slideover-body">
        <div style={{background:'#0a0b0f',border:'1px solid #1f2128',borderRadius:'10px',padding:'14px 16px',display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px'}}>
          <div><div style={{fontSize:'10px',color:'#475569',fontWeight:600,letterSpacing:'0.7px',textTransform:'uppercase',marginBottom:'4px'}}>Von</div><div style={{fontSize:'14px',fontWeight:600,color:'#e2e8f0'}}>{fmtDate(req.from)}</div></div>
          <div><div style={{fontSize:'10px',color:'#475569',fontWeight:600,letterSpacing:'0.7px',textTransform:'uppercase',marginBottom:'4px'}}>Bis</div><div style={{fontSize:'14px',fontWeight:600,color:'#e2e8f0'}}>{fmtDate(req.to)}</div></div>
          <div><div style={{fontSize:'10px',color:'#475569',fontWeight:600,letterSpacing:'0.7px',textTransform:'uppercase',marginBottom:'4px'}}>Urlaubstage</div><div style={{fontSize:'14px',fontWeight:600,color:'#e2e8f0'}}>{req.days} Tage</div></div>
          <div><div style={{fontSize:'10px',color:'#475569',fontWeight:600,letterSpacing:'0.7px',textTransform:'uppercase',marginBottom:'4px'}}>Zugeordnetes Asset</div><div style={{fontSize:'14px',fontWeight:600,color:'#e2e8f0'}}>{req.asset}</div></div>
        </div>
        <div className="rp-ki-box">
          <div className="rp-ki-header">
            <span className="rp-ki-tag">KI</span>
            <span className="rp-ki-title">Konfliktprüfung</span>
            <span style={{marginLeft:'auto',fontSize:'11px',color:'#4ade80',fontWeight:600}}>✓ Abgeschlossen</span>
          </div>
          <div className="rp-ki-text">Prüfung gegen Wartungskalender abgeschlossen. Keine Überschneidungen mit geplanten Asset-Checks im Zeitraum {fmtDate(req.from)} – {fmtDate(req.to)} gefunden. Alle kritischen Wartungen sind durch verfügbare Techniker abgedeckt.</div>
          <div style={{marginTop:'12px',display:'flex',alignItems:'center',gap:'8px'}}>
            <div style={{flex:1,height:'4px',background:'#1a1a2e',borderRadius:'3px',overflow:'hidden'}}>
              <div style={{width:'94%',height:'100%',background:'linear-gradient(90deg,#6366f1,#4ade80)',borderRadius:'3px'}}/>
            </div>
            <span style={{fontSize:'11px',fontWeight:700,color:'#4ade80',whiteSpace:'nowrap'}}>94% Konfidenz</span>
          </div>
        </div>
        {approveState==='success'&&(
          <div style={{background:'rgba(16,185,129,0.1)',border:'1px solid rgba(16,185,129,0.25)',borderRadius:'12px',padding:'16px',textAlign:'center'}}>
            <div style={{fontSize:'28px',marginBottom:'6px'}}>🎉</div>
            <div style={{fontSize:'15px',fontWeight:700,color:'#4ade80'}}>Antrag genehmigt!</div>
            <div style={{fontSize:'12px',color:'#64748b',marginTop:'3px'}}>{req.name} wurde benachrichtigt.</div>
          </div>
        )}
        {req.status!=='approved'&&approveState!=='success'&&(
          <div style={{display:'flex',flexDirection:'column',gap:'10px',marginTop:'auto'}}>
            <button className={`rp-approve-btn${approveState==='loading'?' opacity-60':''}`}
              onClick={()=>handleApprove(req,setSelected)} disabled={approveState!=='idle'}>
              {approveState==='loading'
                ?<><span style={{width:'16px',height:'16px',border:'2px solid rgba(255,255,255,0.3)',borderTopColor:'#fff',borderRadius:'50%',display:'inline-block',animation:'erpSpinner 0.7s linear infinite'}}/> Wird genehmigt…</>
                :<>✓ Genehmigen</>}
            </button>
            <button className="rp-chat-btn" onClick={()=>handleChat(req,setSelected)}>💬 Rücksprache halten</button>
          </div>
        )}
        {req.status==='approved'&&approveState==='idle'&&(
          <div style={{background:'rgba(34,197,94,0.08)',border:'1px solid rgba(34,197,94,0.2)',borderRadius:'12px',padding:'14px',textAlign:'center',color:'#4ade80',fontSize:'13px',fontWeight:600}}>✓ Bereits genehmigt</div>
        )}
      </div>
    </>);
  }

  return(
    <div style={{maxWidth:'100%'}}>
      {/* Header */}
      <div className="flex items-center justify-between mb-6">
        <div>
          <div className="text-white font-bold text-lg">Urlaubs-Dashboard</div>
          <div className="text-gray-500 text-xs mt-0.5">Antragsübersicht · KI-gestützte Konfliktprüfung</div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:'12px'}}>
          <div className="text-xs font-mono text-gray-600">Stand: 14.03.2026</div>
          <div className="rp-view-toggle">
            <button className={`rp-view-toggle-btn${viewMode==='list'?' active':''}`} onClick={()=>setViewMode('list')}>
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" style={{display:'inline',marginRight:'5px',verticalAlign:'middle'}}><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
              Listen-Ansicht
            </button>
            <button className={`rp-view-toggle-btn${viewMode==='calendar'?' active':''}`} onClick={()=>setViewMode('calendar')}>
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" style={{display:'inline',marginRight:'5px',verticalAlign:'middle'}}><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
              Kalender-Ansicht
            </button>
          </div>
        </div>
      </div>

      {/* Metric cards */}
      <div className="grid grid-cols-3 gap-4 mb-6">
        <div className="rp-metric-card" style={{borderColor:'rgba(245,158,11,0.2)'}}>
          <div className="rp-metric-label">Offene Anträge</div>
          <div className="rp-metric-value" style={{color:'#fbbf24'}}>{pendingCount}</div>
          <div className="rp-metric-sub">warten auf Genehmigung</div>
        </div>
        <div className="rp-metric-card" style={{borderColor:'rgba(41,121,255,0.2)'}}>
          <div className="rp-metric-label">Aktive Einsätze heute</div>
          <div className="rp-metric-value" style={{color:'#60a5fa'}}>{activeToday}</div>
          <div className="rp-metric-sub">Techniker im Feld</div>
        </div>
        <div className="rp-metric-card" style={{borderColor:'rgba(34,197,94,0.2)'}}>
          <div className="rp-metric-label">Team-Verfügbarkeit</div>
          <div className="rp-metric-value" style={{color:'#4ade80'}}>{availPct}<span style={{fontSize:'16px',fontWeight:600}}>%</span></div>
          <div className="rp-metric-sub">nächste 30 Tage · Ø Team</div>
        </div>
      </div>

      {/* ── LIST VIEW ── */}
      {viewMode==='list'&&(
        <div className="bg-desk-surface border border-desk-border rounded-xl overflow-hidden">
          <div style={{padding:'14px 20px 12px',borderBottom:'1px solid #1f2128',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <div style={{fontSize:'13px',fontWeight:600,color:'#e2e8f0'}}>Urlaubsanträge</div>
            <div style={{fontSize:'11px',color:'#475569'}}>{requests.length} Einträge</div>
          </div>
          <table className="bc-table">
            <thead><tr>
              <th>Mitarbeiter</th><th>Rolle</th><th>Zeitraum</th><th>Tage</th><th>Status</th>
            </tr></thead>
            <tbody>
              {requests.map(r=>(
                <tr key={r.id} onClick={()=>{setSelected(r);setApproveState('idle');}} style={{cursor:'pointer'}}>
                  <td>
                    <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
                      <div style={{width:'30px',height:'30px',borderRadius:'50%',background:'rgba(99,102,241,0.15)',border:'1px solid rgba(99,102,241,0.25)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'11px',fontWeight:700,color:'#818cf8',flexShrink:0}}>{r.initials}</div>
                      <div>
                        <div style={{fontSize:'13px',fontWeight:600,color:'#e2e8f0'}}>{r.name}</div>
                        <div style={{fontSize:'10px',color:'#475569',fontFamily:"'JetBrains Mono',monospace"}}>{r.id}</div>
                      </div>
                    </div>
                  </td>
                  <td><span className={`rp-role-chip ${roleChipMap[r.role]}`}>{roleLabelMap[r.role]}</span></td>
                  <td style={{fontSize:'12px',color:'#94a3b8'}}>{fmtDate(r.from)} – {fmtDate(r.to)}</td>
                  <td style={{fontSize:'13px',fontWeight:600,color:'#e2e8f0'}}>{r.days}</td>
                  <td><span className={`rp-status-chip ${statusChipCls[r.status]}`}>{statusLabel[r.status]}</span></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      {/* ── CALENDAR VIEW ── */}
      {viewMode==='calendar'&&(
        <div className="bg-desk-surface border border-desk-border rounded-xl overflow-hidden">
          {/* Calendar header */}
          <div className="rp-cal-header">
            <button className="rp-cal-nav-btn" onClick={prevMonth}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            <div style={{textAlign:'center'}}>
              <div style={{fontSize:'16px',fontWeight:700,color:'#fff'}}>{MONTH_NAMES[calMonth]} {calYear}</div>
              <div style={{fontSize:'11px',color:'#475569',marginTop:'1px'}}>
                {requests.filter(r=>{
                  const f=new Date(r.from+'T00:00:00'),t=new Date(r.to+'T00:00:00');
                  const ms=new Date(calYear,calMonth,1),me=new Date(calYear,calMonth+1,0);
                  return f<=me&&t>=ms;
                }).length} Urlaubsanträge · {DEPLOYMENT_EVENTS.filter(e=>{
                  const f=new Date(e.from+'T00:00:00'),t=new Date(e.to+'T00:00:00');
                  const ms=new Date(calYear,calMonth,1),me=new Date(calYear,calMonth+1,0);
                  return f<=me&&t>=ms;
                }).length} Einsätze diesen Monat
              </div>
            </div>
            <button className="rp-cal-nav-btn" onClick={nextMonth}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
          </div>

          {/* Legend */}
          <div style={{display:'flex',alignItems:'center',gap:'16px',padding:'10px 20px',borderBottom:'1px solid #1f2128',background:'#0a0b0f'}}>
            <div style={{display:'flex',alignItems:'center',gap:'6px'}}>
              <div style={{width:'10px',height:'10px',borderRadius:'2px',background:'#4ade80'}}/>
              <span style={{fontSize:'11px',color:'#64748b',fontWeight:500}}>Urlaub (genehmigt)</span>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:'6px'}}>
              <div style={{width:'10px',height:'10px',borderRadius:'2px',background:'#fbbf24'}}/>
              <span style={{fontSize:'11px',color:'#64748b',fontWeight:500}}>Urlaub (offen)</span>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:'6px'}}>
              <div style={{width:'10px',height:'10px',borderRadius:'2px',background:'#60a5fa'}}/>
              <span style={{fontSize:'11px',color:'#64748b',fontWeight:500}}>Einsatz</span>
            </div>
            <div style={{marginLeft:'auto',fontSize:'11px',color:'#475569'}}>Klick auf Tag öffnet Details</div>
          </div>

          {/* Day-of-week header */}
          <div className="rp-cal-dow-row">
            {DOW.map(d=><div key={d} className="rp-cal-dow">{d}</div>)}
          </div>

          {/* Grid */}
          <div className="rp-cal-grid">
            {calDays.map((day,i)=>{
              const {vacations,deployments}=getDayItems(day.date);
              const hasEvents=vacations.length>0||deployments.length>0;
              const today=isToday(day.date);
              const allItems=[
                ...vacations.map(v=>({...v,_type:'urlaub'})),
                ...deployments.map(e=>({...e,_type:'einsatz'})),
              ];
              const visible=allItems.slice(0,2);
              const extra=allItems.length-visible.length;
              return(
                <div key={i}
                  className={`rp-cal-cell${today?' today':''}${!day.inMonth?' other-month':''}${hasEvents?' has-events':''}`}
                  onClick={()=>day.inMonth&&openDaySlide(day)}>
                  <div className="rp-cal-day-num">{day.date.getDate()}</div>
                  {visible.map((item,j)=>(
                    <span key={j} className={`rp-cal-pill ${item._type==='einsatz'?'einsatz':`urlaub${item.status==='pending'?' pending':''}`}`}>

                  {extra>0&&<span className="rp-cal-more">+{extra} weitere</span>}
                </div>
              );
            })}
          </div>
        </div>

      {/* ── SLIDE-OVER: single request from list ── */}
      {selected&&(<>
        <div className="bc-backdrop" onClick={()=>setSelected(null)}/>
        <div className="rp-slideover">
          <SlideOverSingleRequest req={selected} onClose={()=>setSelected(null)}/>
        </div>
      </>)}

      {/* ── SLIDE-OVER: day details from calendar ── */}
      {daySlide&&(<>
        <div className="bc-backdrop" onClick={()=>setDaySlide(null)}/>

    </div>

}

function ArchivPage(){
  const [search,setSearch]=React.useState('');
  const [machineFilter,setMachineFilter]=React.useState('');
  const [dateFrom,setDateFrom]=React.useState('');
  const [dateTo,setDateTo]=React.useState('');
  const [preview,setPreview]=React.useState(null); // archive record for modal

  const parseDate=s=>{
    const [d,mo,y]=s.split('.');
    return new Date(+y,+mo-1,+d);
  };

  const docLabel={rechnung:'Rechnung',bericht:'Bericht',garantie:'Garantie',wartung:'Wartung',kulanz:'Kulanz'};
  const machines=[...new Set(ARCHIVE_RECORDS.map(r=>r.asset))].sort();

  const filtered=ARCHIVE_RECORDS.filter(r=>{
    if(search&&!r.customer.toLowerCase().includes(search.toLowerCase())&&!r.id.toLowerCase().includes(search.toLowerCase()))return false;
    if(machineFilter&&r.asset!==machineFilter)return false;
    if(dateFrom){const df=parseDate(r.date),from=new Date(dateFrom);if(df<from)return false;}
    if(dateTo){const df=parseDate(r.date),to=new Date(dateTo);if(df>to)return false;}
    return true;
  }).sort((a,b)=>parseDate(b.date)-parseDate(a.date));

  function resetFilters(){setSearch('');setMachineFilter('');setDateFrom('');setDateTo('');}
  const hasFilter=search||machineFilter||dateFrom||dateTo;

  const statusCls={übertragen:'uebertragen',abgeschlossen:'abgeschlossen',storniert:'storniert'};
  const statusLabel={übertragen:'✓ Übertragen',abgeschlossen:'● Abgeschlossen',storniert:'✕ Storniert'};

  function fmtAmt(r){
    if(r.amount===0)return<span style={{color:'#475569',fontFamily:"'JetBrains Mono',monospace",fontSize:'12px'}}>0,00 €</span>;
    return r.amount.toFixed(2).replace('.',',')+' €';
  }

  return(
    <div className="max-w-6xl">

      {/* Header */}
      <div className="flex items-center justify-between mb-5">
        <div>
          <div className="text-white font-bold text-lg">Archiv & Historie</div>
          <div className="text-gray-500 text-xs mt-0.5">{ARCHIVE_RECORDS.length} Dokumente · Chronologisch sortiert</div>
        </div>
        <div className="text-xs font-mono text-gray-600">Stand: 13.03.2026</div>
      </div>

      {/* Main card */}
      <div className="bg-desk-surface border border-desk-border rounded-xl overflow-hidden">

        {/* Filter Bar */}
        <div className="arch-filter-bar">
          {/* Kundensuche */}
          <div className="arch-filter-group">
            <span className="arch-filter-label">Suche</span>
            <div className="arch-search-wrap">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#475569" strokeWidth="2" strokeLinecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              <input className="arch-filter-input" placeholder="Kunde oder Dok.-Nr." value={search} onChange={e=>setSearch(e.target.value)}/>
            </div>
          </div>

          {/* Maschinen-Filter */}
          <div className="arch-filter-group" style={{flex:'0 0 auto'}}>
            <span className="arch-filter-label">Maschine</span>
            <select className="arch-filter-select" value={machineFilter} onChange={e=>setMachineFilter(e.target.value)}>
              <option value="">Alle Assets</option>
              {machines.map(a=><option key={a} value={a}>{a}</option>)}
            </select>
          </div>

          {/* Datumsbereich */}
          <div className="arch-filter-group" style={{flex:'0 0 auto'}}>
            <span className="arch-filter-label">Zeitraum</span>
            <div className="arch-date-wrap">
              <input type="date" className="arch-date-input" value={dateFrom} onChange={e=>setDateFrom(e.target.value)} title="Von"/>
              <span className="arch-date-sep">–</span>
              <input type="date" className="arch-date-input" value={dateTo} onChange={e=>setDateTo(e.target.value)} title="Bis"/>
            </div>
          </div>

          {hasFilter&&<button className="arch-reset-btn" onClick={resetFilters}>↺ Zurücksetzen</button>}
        </div>

        {/* Table */}
        <div className="overflow-x-auto">
          <table className="arch-table">
            <thead>
              <tr>
                <th>Datum</th>
                <th>Dok.-Nr.</th>
                <th>Kunde</th>
                <th>Asset</th>
                <th>Typ</th>
                <th style={{textAlign:'right'}}>Betrag</th>
                <th>Status</th>
                <th style={{textAlign:'right',paddingRight:'20px'}}>Aktionen</th>
              </tr>
            </thead>
            <tbody>
              {filtered.length===0?(
                <tr><td colSpan="8">
                  <div className="arch-empty">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#475569" strokeWidth="1.5" strokeLinecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                    <div className="arch-empty-text">Keine Dokumente gefunden</div>
                  </div>
                </td></tr>
              ):filtered.map(r=>(
                <tr key={r.id}>
                  <td className="td-mono">{r.date}</td>
                  <td className="td-mono">{r.id}</td>
                  <td className="td-primary">{r.customer}</td>
                  <td style={{color:'#94a3b8',fontSize:'12px'}}>{r.asset}</td>
                  <td><span className={`arch-doc-chip ${r.docType}`}>{docLabel[r.docType]}</span></td>
                  <td className="td-amount">{fmtAmt(r)}</td>
                  <td><span className={`arch-status ${statusCls[r.status]}`}>{statusLabel[r.status]}</span></td>
                  <td style={{paddingRight:'20px'}}>
                    <div className="arch-actions">
                      <button className="arch-icon-btn" title="Vorschau" onClick={()=>setPreview(r)}>
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                      </button>
                      <button className="arch-icon-btn dl" title="Herunterladen" onClick={()=>window.print()}>
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                      </button>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>

        {/* Table footer */}
        {filtered.length>0&&(
          <div className="px-5 py-3 border-t border-desk-border flex items-center justify-between">
            <div className="text-xs text-gray-600">{filtered.length} von {ARCHIVE_RECORDS.length} Einträgen</div>
            <div className="text-xs font-mono text-gray-600">
              Gesamt: {filtered.filter(r=>r.amount>0).reduce((s,r)=>s+r.amount,0).toFixed(2).replace('.',',')} €
            </div>
          </div>
        )}
      </div>

      {/* Invoice Preview Modal */}
      {preview&&(
        <InvoicePreviewModal
          mission={preview.mission}
          billingType={preview.mission.ki.type}
          laborRaw={preview.mission.ki.hours*70}
          travelRaw={preview.mission.ki.travel*0.5}
          partsRaw={preview.mission.ki.partsCost}
          onClose={()=>setPreview(null)}
          onCloseAll={()=>setPreview(null)}
        />
      )}
    </div>
  );
}

  const isResourcePage=['urlaub'].includes(activePage);
  const pageTitle={
    executive:'Executive Insights',
    dashboard:'Dashboard',assets:'Asset-Verwaltung',auftraege:'Auftragsmanagement',
    techniker:'Techniker',news:'News & Updates',einstellungen:'Einstellungen',
    abrechnungsbridge:'Abrechnungs-Bridge',garantiecheck:'Garantie-Check',archiv:'Archiv & Historie',
    urlaub:'Urlaubs-Dashboard',
  }[activePage]||'';

  const sw=collapsed?64:224;
  const navBtnCls=(active)=>`w-full flex items-center gap-2.5 px-2.5 py-2 rounded-lg text-sm font-medium transition-all ${active?'bg-desk-accent/10 text-desk-accent':'text-gray-500 hover:text-gray-300 hover:bg-white/[0.03]'}`;

  function goPage(id){
    setActivePage(id);
    if(['abrechnungsbridge','garantiecheck','archiv'].includes(id)) setBillingOpen(true);
    if(['urlaub'].includes(id)) setResourceOpen(true);
  }

  return(
    <div className="bg-desk-base min-h-screen flex font-sans text-white">

      {/* ── Sidebar ── */}
      <div style={{width:`${sw}px`,transition:'width 0.22s cubic-bezier(0.4,0,0.2,1)'}}
        className="bg-desk-sidebar border-r border-desk-border fixed left-0 top-0 bottom-0 flex flex-col z-30 overflow-hidden">

        {/* Logo row */}
        <div className="flex items-center border-b border-desk-border flex-shrink-0" style={{height:'56px',padding:'0 10px 0 14px'}}>
          <button onClick={()=>goPage('dashboard')} className="flex items-center gap-2.5 hover:opacity-80 transition-opacity flex-1 min-w-0 overflow-hidden">
            <img src="img/aslogo.png" style={{width:'26px',height:'26px',objectFit:'contain',borderRadius:'5px',flexShrink:0}}/>
            {!collapsed&&<span className="font-bold text-white tracking-widest text-xs whitespace-nowrap overflow-hidden">ASSETLOGIC</span>}
          </button>
          <button onClick={()=>setCollapsed(v=>!v)}
            className="w-7 h-7 rounded-md flex items-center justify-center text-gray-600 hover:text-gray-300 hover:bg-white/5 transition-all flex-shrink-0"
            title={collapsed?'Sidebar ausklappen':'Sidebar einklappen'}>
            {collapsed?<IconChevronsRight size={13}/>:<IconChevronsLeft size={13}/>}
          </button>
        </div>

        {/* Nav */}
        <nav className="flex-1 overflow-y-auto py-3 px-2 flex flex-col gap-0.5">
          {navItems.map(([id,label,icon])=>{
            const isExec=id==='executive';
            const isActive=activePage===id;
            const execActiveCls=isExec&&isActive?'bg-[rgba(234,179,8,0.1)] text-[#EAB308]':'';
            const execHoverStyle=isExec?{boxShadow:isActive?'0 0 0 1px rgba(234,179,8,0.25) inset':undefined}:{};
            return(
              <React.Fragment key={id}>
                <button onClick={()=>goPage(id)} title={collapsed?label:undefined}
                  className={isExec?(isActive?`w-full flex items-center gap-2.5 px-2.5 py-2 rounded-lg text-sm font-semibold transition-all ${execActiveCls}`:`w-full flex items-center gap-2.5 px-2.5 py-2 rounded-lg text-sm font-medium transition-all text-[#92834a] hover:text-[#EAB308] hover:bg-[rgba(234,179,8,0.05)]`):navBtnCls(isActive)}
                  style={{justifyContent:collapsed?'center':'flex-start',...execHoverStyle}}>
                  <span className="flex-shrink-0" style={isExec?{color:isActive?'#EAB308':'#92834a'}:{}}>{icon}</span>
                  {!collapsed&&<span className="truncate">{label}</span>}
                </button>
                {isExec&&<div className="h-px bg-desk-border mx-1 my-1"/>}
              </React.Fragment>
            );
          })}

          {/* Billing Center section */}
          <div className="mt-3">
            {!collapsed?(
              <button onClick={()=>setBillingOpen(v=>!v)}
                className="w-full flex items-center justify-between px-2.5 pb-1.5 group">
                <span className="text-[10px] font-semibold text-gray-600 tracking-widest uppercase group-hover:text-gray-500 transition-colors">Billing Center</span>
                <span className="text-gray-600 group-hover:text-gray-400 transition-colors">
                  {billingOpen?<IconChevDown size={11}/>:<IconChevRight2 size={11}/>}
                </span>
              </button>
            ):(
              <div className="h-px bg-desk-border mx-2 mb-2"/>
            )}
            {(billingOpen||collapsed)&&billingItems.map(([id,label,icon])=>(
              <button key={id} onClick={()=>goPage(id)} title={collapsed?label:undefined}
                className={`${navBtnCls(activePage===id)} ${collapsed?'':'pl-4'}`}
                style={{justifyContent:collapsed?'center':'flex-start'}}>
                <span className="flex-shrink-0" style={{color:activePage===id?'#60a5fa':'inherit'}}>{icon}</span>
                {!collapsed&&<span className="truncate text-xs">{label}</span>}
              </button>
            ))}
          </div>

          {/* Resource Planning section */}
          <div className="mt-3">
            {!collapsed?(
              <button onClick={()=>setResourceOpen(v=>!v)}
                className="w-full flex items-center justify-between px-2.5 pb-1.5 group">
                <span className="text-[10px] font-semibold text-gray-600 tracking-widest uppercase group-hover:text-gray-500 transition-colors">Resource Planning</span>
                <span className="text-gray-600 group-hover:text-gray-400 transition-colors">
                  {resourceOpen?<IconChevDown size={11}/>:<IconChevRight2 size={11}/>}
                </span>
              </button>
            ):(
              <div className="h-px bg-desk-border mx-2 mb-2"/>
            )}
            {(resourceOpen||collapsed)&&resourceItems.map(([id,label,icon])=>(
              <button key={id} onClick={()=>goPage(id)} title={collapsed?label:undefined}
                className={`${navBtnCls(activePage===id)} ${collapsed?'':'pl-4'}`}
                style={{justifyContent:collapsed?'center':'flex-start'}}>
                <span className="flex-shrink-0" style={{color:activePage===id?'#a78bfa':'inherit'}}>{icon}</span>
                {!collapsed&&<span className="truncate text-xs">{label}</span>}
              </button>
            ))}
          </div>
        </nav>

        {/* User */}
        <div className="p-3 border-t border-desk-border flex-shrink-0">
          <div className="flex items-center gap-2.5" style={{justifyContent:collapsed?'center':'flex-start'}}>
            <div className="w-7 h-7 rounded-full bg-desk-accent/20 flex items-center justify-center text-desk-accent text-[10px] font-bold flex-shrink-0">{user.initials}</div>
            {!collapsed&&(
              <div className="min-w-0 flex-1">
                <div className="text-white text-xs font-medium truncate">{user.name}</div>
                <span className={`text-[10px] px-1.5 py-0.5 rounded-full ${getRoleColor(user.role)}`}>{getRoleLabel(user.role)}</span>
              </div>
            )}
          </div>
        </div>
      </div>

      {/* ── Main content ── */}
      <div style={{marginLeft:`${sw}px`,transition:'margin-left 0.22s cubic-bezier(0.4,0,0.2,1)'}}
        className="flex-1 flex flex-col min-h-screen">
        <div className="h-14 border-b border-desk-border flex items-center px-6 justify-between bg-desk-base/80 backdrop-blur sticky top-0 z-20">
          <div className="flex items-center gap-2">
            {activePage==='executive'&&(
              <span className="text-xs px-2 py-0.5 rounded-md font-semibold mr-1" style={{background:'rgba(234,179,8,0.1)',color:'#EAB308',border:'1px solid rgba(234,179,8,0.22)'}}>✦ CEO</span>
            )}
            {isBillingPage&&(
              <span className="text-xs px-2 py-0.5 rounded-md bg-[rgba(41,121,255,0.1)] text-[#60a5fa] border border-[rgba(41,121,255,0.15)] font-medium mr-1">Billing</span>
            )}
            {isResourcePage&&(
              <span className="text-xs px-2 py-0.5 rounded-md bg-[rgba(139,92,246,0.1)] text-[#a78bfa] border border-[rgba(139,92,246,0.15)] font-medium mr-1">Resource Planning</span>
            )}
            <div className="text-white font-semibold">{pageTitle}</div>
          </div>
          <div className="flex items-center gap-3">
            <div className="relative">
              <IconSearch size={14} cls="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500"/>
              <input placeholder="Suchen…" className="bg-desk-surface border border-desk-border rounded-lg pl-8 pr-4 py-1.5 text-white text-sm focus:outline-none focus:border-desk-accent w-48"/>
            </div>
            <button onClick={onLogout} title="Abmelden" className="w-8 h-8 rounded-full bg-desk-accent/20 flex items-center justify-center text-desk-accent text-xs font-bold hover:bg-desk-accent/30 transition-colors">
              {user.initials}
            </button>
          </div>
        </div>
        <div className="flex-1 overflow-y-auto p-6 page-enter" key={activePage}>
          {activePage==='executive'&&<ExecInsightsPage/>}
          {activePage==='dashboard'&&<DashboardPage onNavigate={setActivePage} onSelectAsset={setSelectedAsset}/>}
          {activePage==='assets'&&<AssetsPage onSelect={setSelectedAsset}/>}
          {activePage==='auftraege'&&<AuftraegePage orders={orders} setOrders={setOrders} showNew={showNew} setShowNew={setShowNew}/>}
          {activePage==='techniker'&&<TechnikerPage/>}
          {activePage==='news'&&<NewsPage/>}
          {activePage==='einstellungen'&&<EinstellungenPage/>}
          {activePage==='abrechnungsbridge'&&<AbrechnungsBridgePage onOpenSlideOver={setSlideOver}/>}
          {activePage==='garantiecheck'&&<GarantieCheckPage onOpenSlideOver={setSlideOver}/>}
          {activePage==='archiv'&&<ArchivPage/>}
          {activePage==='urlaub'&&<UrlaubsDashboardPage/>}
        </div>
      </div>

      {/* ── Slide-over overlay ── */}
      {slideOver&&(<>
        <div className="bc-backdrop" onClick={()=>setSlideOver(null)}/>
        <BillingSlideOver mission={slideOver} onClose={()=>setSlideOver(null)}/>
      </>)}
    </div>
  );
}

// ── ERROR BOUNDARY ────────────────────────────────────────────────────────────
class ErrorBoundary extends React.Component {
  constructor(props){super(props);this.state={error:null};}
  static getDerivedStateFromError(e){return{error:e};}
  render(){
    if(this.state.error) return(
      <div className="min-h-screen bg-[#0d0d0d] flex items-center justify-center px-4">
        <div className="bg-[#1a1a1a] border border-red-500/30 rounded-2xl p-8 max-w-sm w-full text-center">
          <div className="text-red-400 text-4xl mb-4">⚠</div>
          <div className="text-white font-bold mb-2">Rendering-Fehler</div>
          <div className="text-gray-400 text-sm mb-4">{this.state.error.message}</div>
          <button onClick={()=>this.setState({error:null})} className="bg-[#2979FF] text-white rounded-xl px-6 py-2 text-sm font-semibold">Neu laden</button>
        </div>
      </div>
    );
    return this.props.children;
  }
}

// ── APP ROUTER & ROOT ─────────────────────────────────────────────────────────
function AppRouter({user,onLogout}){
  const forcesMobile=isMobileDevice()||user.role==='TECHNIKER';
  if(forcesMobile)return<MobileApp user={user} onLogout={onLogout}/>;
  return<DesktopDashboard user={user} onLogout={onLogout}/>;
}

function App(){
  const [user,setUser]=React.useState(null);
  const [diagData,setDiagData]=React.useState(null);
  React.useEffect(()=>{_setDiagnostic=setDiagData;return()=>{_setDiagnostic=null;};},[]);
  return(<>
    {user?<AppRouter user={user} onLogout={()=>setUser(null)}/>:<LoginScreen onLogin={setUser}/>}
    <DiagnosticPopup data={diagData} onClose={()=>setDiagData(null)}/>
    <ToastContainer/>
  </>);
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <ErrorBoundary><App/></ErrorBoundary>
);
</script>
</body>
</html>
