const _ordersListeners = new Set();
function useSharedOrders(){
  const [orders,setLocal]=React.useState(_globalOrders);
  React.useEffect(()=>{
    // Sync with any changes made while this component was unmounted
    setLocal(_globalOrders);
    const listener=(o)=>setLocal(o);
    _ordersListeners.add(listener);
    return()=>_ordersListeners.delete(listener);
  },[]);
  function setOrders(updater){
    const next=typeof updater==='function'?updater(_globalOrders):updater;
    _globalOrders=next;
    _ordersListeners.forEach(fn=>fn(next));
  }
  return [orders,setOrders];
}

// ── DIAGNOSE SECTION ──────────────────────────────────────────────────────────
function DiagnoseSection({asset}){
  const [code,setCode]=React.useState('');
  const [result,setResult]=React.useState(null);
  const [loading,setLoading]=React.useState(false);
  const [scanning,setScanning]=React.useState(false);
  const [scanPhase,setScanPhase]=React.useState('scanning');

  // Pre-fill: pending code from DiagnosticPopup → auto-analyse; else from asset status
  React.useEffect(()=>{
    if(_pendingDiagCode){
      const c=_pendingDiagCode;
      _pendingDiagCode=null;
      setCode(c);
      setTimeout(()=>{
        const found=FEHLER_CODES_DB[c.trim().toUpperCase()];
        setResult(found||'not_found');
      },400);
    } else if(asset.status==='FEHLER') setCode('E-001');
    else if(asset.status==='WARTUNG') setCode('W-101');
  },[asset]);

  function analyse(){
    if(!code.trim()) return;
    setLoading(true);
    setResult(null);
    setTimeout(()=>{
      const found=FEHLER_CODES_DB[code.trim().toUpperCase()];
      setResult(found||'not_found');
      setLoading(false);
    }, 900);
  }

  function startScan(){
    setScanning(true);
    setScanPhase('scanning');
    setTimeout(()=>setScanPhase('found'),2000);
  }

  function acceptScan(){
    setCode('E-001');
    setScanning(false);
    setTimeout(()=>analyse(),100);
  }

  const sevColor={
    KRITISCH:'text-red-400 bg-red-500/15 border-red-500/30',
    HOCH:    'text-amber-400 bg-amber-500/15 border-amber-500/30',
    MITTEL:  'text-yellow-400 bg-yellow-500/15 border-yellow-500/30',
    NIEDRIG: 'text-gray-400 bg-gray-500/15 border-gray-500/30',
  };

  const quickCodes=asset.status==='FEHLER'
    ?['E-001','E-002','F-201','F-202']
    :asset.status==='WARTUNG'
    ?['W-101','W-102','E-003','H-301']
    :['W-101','E-003','H-301','F-202'];

  return(
    <div className="tile-glass rounded-2xl overflow-hidden">
      {/* Header */}
      <div className="flex items-center justify-between px-4 pt-4 pb-3 border-b border-slate-800">
        <div className="flex items-center gap-2.5">
          <div className="w-7 h-7 rounded-lg bg-[#2979FF]/15 flex items-center justify-center">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#2979FF" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/>
            </svg>
          </div>
          <span className="text-white text-sm font-semibold">Diagnose</span>
        </div>
        <span className="text-gray-600 text-xs">Fehlercode eingeben oder scannen</span>
      </div>

      <div className="p-4 space-y-4">
        {/* Input row */}
        <div className="flex gap-2">
          <div className="flex-1 relative">
            <input value={code} onChange={e=>setCode(e.target.value.toUpperCase())}
              onKeyDown={e=>e.key==='Enter'&&analyse()}
              placeholder="z.B. E-001 oder W-101"
              className="w-full bg-black border border-slate-700 rounded-xl px-4 py-3 text-[#2979FF] text-sm font-semibold focus:outline-none focus:border-[#2979FF] focus:ring-1 focus:ring-[#2979FF]/30 placeholder-slate-600"
              style={{fontFamily:'JetBrains Mono,monospace',letterSpacing:'0.08em'}}/>
            {code&&<button onClick={()=>{setCode('');setResult(null);}}
              className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-600 hover:text-slate-400">
              <IconX size={14}/>
            </button>}
          </div>
          <button onClick={startScan}
            className="btn-press w-12 h-12 flex items-center justify-center bg-black border border-slate-700 rounded-xl text-slate-400 hover:border-[#2979FF] hover:text-[#2979FF] transition-all flex-shrink-0">
            <IconCamera size={18}/>
          </button>
          <button onClick={analyse} disabled={!code.trim()||loading}
            className="btn-press px-4 h-12 bg-[#2979FF] hover:bg-blue-700 disabled:opacity-40 disabled:cursor-not-allowed text-white text-sm font-semibold rounded-xl transition-all flex-shrink-0 flex items-center gap-2"
            style={{minWidth:'100px'}}>
            {loading
              ?<><span className="w-3.5 h-3.5 border-2 border-white/30 border-t-white rounded-full animate-spin inline-block"/><span>Analyse…</span></>
              :<><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="13 17 18 12 13 7"/><polyline points="6 17 11 12 6 7"/></svg>Analysieren</>}
          </button>
        </div>

        {/* Quick-Select Codes */}
        {!result&&(
          <div>
            <div className="text-slate-600 text-xs mb-2">Häufige Codes für {asset.type}:</div>
            <div className="flex flex-wrap gap-2">
              {quickCodes.map(c=>{
                const info=FEHLER_CODES_DB[c];
                return info?(
                  <button key={c} onClick={()=>{setCode(c);setTimeout(()=>analyse(),50);}}
                    className="btn-press flex items-center gap-1.5 px-3 py-1.5 bg-black border border-slate-700 hover:border-[#2979FF]/50 rounded-lg text-xs transition-all group">
                    <span className="font-semibold text-[#2979FF] group-hover:text-blue-400" style={{fontFamily:'JetBrains Mono,monospace'}}>{c}</span>
                    <span className="text-slate-500 group-hover:text-slate-400 truncate max-w-[120px]">{info.title}</span>
                  </button>
                ):null;
              })}
            </div>
          </div>
        )}

        {/* Result */}
        {result&&result!=='not_found'&&(
          <div className="fade-in space-y-3">
            {/* Error header */}
            <div className={`flex items-start justify-between p-3 rounded-xl border ${sevColor[result.severity]}`}>
              <div>
                <div className="flex items-center gap-2 mb-1">
                  <span className="font-mono-tech text-xs font-bold opacity-70" style={{fontFamily:'JetBrains Mono,monospace'}}>{code}</span>
                  <span className={`text-xs font-bold px-2 py-0.5 rounded-full border ${sevColor[result.severity]}`}>{result.severity}</span>
                </div>
                <div className="font-semibold text-sm text-white">{result.title}</div>
                <div className="text-xs mt-1 opacity-80">{result.desc}</div>
              </div>
            </div>

            {/* Reparaturvorschlag */}
            <div className="bg-black border border-slate-800 rounded-xl p-4">
              <div className="flex items-center gap-2 mb-3">
                <IconWrench size={14} cls="text-amber-400"/>
                <span className="text-amber-400 text-xs font-semibold uppercase tracking-wider">Reparaturvorschlag</span>
                <div className="ml-auto flex items-center gap-1.5 bg-amber-500/10 border border-amber-500/20 rounded-lg px-2 py-1">
                  <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#fbbf24" strokeWidth="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                  <span className="text-amber-400 text-xs font-semibold" style={{fontFamily:'JetBrains Mono,monospace'}}>{result.zeit}</span>
                </div>
              </div>
              <ol className="space-y-2.5">
                {result.schritte.map((s,i)=>(
                  <li key={i} className="flex items-start gap-3">
                    <span className="w-5 h-5 rounded-full bg-[#2979FF]/20 text-[#2979FF] text-xs font-bold flex items-center justify-center flex-shrink-0 mt-0.5">{i+1}</span>
                    <span className="text-gray-300 text-sm leading-snug">{s}</span>
                  </li>
                ))}
              </ol>
            </div>

            {/* Ersatzteile */}
            <div className="bg-black border border-slate-800 rounded-xl p-4">
              <div className="flex items-center gap-2 mb-3">
                <IconBox size={14} cls="text-purple-400"/>
                <span className="text-purple-400 text-xs font-semibold uppercase tracking-wider">Benötigte Ersatzteile</span>
              </div>
              <div className="space-y-2">
                {result.teile.map((t,i)=>(
                  <div key={i} className="flex items-center justify-between py-1.5 border-b border-slate-800 last:border-0">
                    <span className="text-gray-300 text-sm">{t}</span>
                    <button className="text-xs text-[#2979FF] hover:underline">Bestellen →</button>
                  </div>
                ))}
              </div>
            </div>

            {/* CTA */}
            <button className="btn-press w-full bg-green-500/15 hover:bg-green-500/25 border border-green-500/30 rounded-xl py-3 text-green-400 font-semibold text-sm transition-all flex items-center justify-center gap-2">
              <IconClipboard size={16}/>
              Reparaturauftrag erstellen
            </button>
          </div>
        )}

        {result==='not_found'&&(
          <div className="fade-in bg-black border border-slate-700 rounded-xl p-4 text-center">
            <div className="text-slate-500 text-sm">Code <span className="text-white font-mono font-bold">{code}</span> nicht in der Datenbank.</div>
            <div className="text-slate-600 text-xs mt-1">Bitte Handbuch konsultieren oder Hersteller kontaktieren.</div>
          </div>
        )}
      </div>

      {/* Scan-Overlay */}
      {scanning&&(
        <div className="fixed inset-0 z-[60] bg-black/95 flex flex-col items-center justify-center">
          {scanPhase==='scanning'?(
            <div className="flex flex-col items-center gap-5">
              <div className="text-slate-400 text-sm mb-2">Fehlercode-Scanner</div>
              <div className="relative w-48 h-32 scan-frame border border-[#2979FF]/30 rounded-lg">
                <div className="absolute top-0 left-0 w-8 h-8 border-t-4 border-l-4 border-[#2979FF] rounded-tl-lg"/>
                <div className="absolute top-0 right-0 w-8 h-8 border-t-4 border-r-4 border-[#2979FF] rounded-tr-lg"/>
                <div className="absolute bottom-0 left-0 w-8 h-8 border-b-4 border-l-4 border-[#2979FF] rounded-bl-lg"/>
                <div className="absolute bottom-0 right-0 w-8 h-8 border-b-4 border-r-4 border-[#2979FF] rounded-br-lg"/>
                <div className="scan-line-el"/>
              </div>
              <div className="text-slate-500 text-xs animate-pulse">Fehlercode-Label oder Display scannen…</div>
            </div>
          ):(
            <div className="flex flex-col items-center gap-4 fade-in px-6 text-center">
              <div className="w-16 h-16 rounded-full bg-[#2979FF]/20 flex items-center justify-center check-pop">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#2979FF" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
              </div>
              <div>
                <div className="text-white font-bold text-lg mb-1">Code erkannt</div>
                <div className="text-[#2979FF] font-mono font-bold text-2xl" style={{fontFamily:'JetBrains Mono,monospace'}}>E-001</div>
                <div className="text-slate-400 text-sm mt-1">Hydraulikdruck zu niedrig</div>
              </div>
              <div className="flex gap-3 w-full">
                <button onClick={acceptScan} className="btn-press flex-1 bg-[#2979FF] text-white font-semibold py-3 rounded-xl text-sm">Übernehmen & analysieren</button>
                <button onClick={()=>setScanning(false)} className="btn-press flex-1 border border-slate-700 text-slate-400 py-3 rounded-xl text-sm">Abbrechen</button>
              </div>
            </div>
          )}
          <button onClick={()=>setScanning(false)} className="absolute top-6 right-6 text-slate-600 hover:text-slate-400"><IconX size={22}/></button>
        </div>
      )}
    </div>
  );
}

// ── COUNTDOWN HELPER ──────────────────────────────────────────────────────────
function daysUntil(dateStr){
  const diff=new Date(dateStr)-new Date();
  return Math.ceil(diff/(1000*60*60*24));
}

// ── ASSET DETAIL VIEW ─────────────────────────────────────────────────────────
// ── SCHALTPLAN MODAL ──────────────────────────────────────────────────────────
// ── GLOBAL DIAGNOSTIC POPUP ───────────────────────────────────────────────────
// Module-level setter — allows any component to open the popup without prop drilling
let _setDiagnostic=null;
function openDiagnostic(data){if(_setDiagnostic)_setDiagnostic(data);}

// Global asset navigation + pending diagnosis code
let _navigateToAsset=null;
let _pendingDiagCode=null;
function goToDiagnose(assetName, code){
  const asset=ASSETS_DB.find(a=>a.name===assetName);
  if(asset&&_navigateToAsset){_pendingDiagCode=code||null;_navigateToAsset(asset);}
}

function DiagnosticPopup({data,onClose}){
  if(!data)return null;
  const isCrit=data.severity==='KRITISCH';
  const isWarn=data.severity==='WARNUNG'||data.severity==='HOCH';
  const accentCls=isCrit?'text-red-400 bg-red-500/15 border-red-500/30':isWarn?'text-amber-400 bg-amber-500/15 border-amber-500/30':'text-blue-400 bg-blue-500/15 border-blue-500/30';
  const solveCls=isCrit?'bg-red-500/5 border-red-500/20 text-red-400':'bg-amber-500/5 border-amber-500/20 text-amber-400';
  const btnCls=isCrit?'bg-red-600 hover:bg-red-700':isWarn?'bg-amber-600 hover:bg-amber-700':'bg-[#2979FF] hover:bg-blue-700';
  const borderAnimCls=isCrit?'diag-border-crit':isWarn?'diag-border-warn':'';
  return(
    <div className="fixed inset-0 z-[90] flex items-end justify-center"
      style={{background:'rgba(0,0,0,0.72)',backdropFilter:'blur(8px)',WebkitBackdropFilter:'blur(8px)'}}
      onClick={onClose}>
      <div className={`w-full max-w-lg rounded-t-3xl border-t border-x border-slate-700 diag-slide-in ${borderAnimCls}`}
        style={{background:'rgba(10,14,26,0.98)',backdropFilter:'blur(24px)',WebkitBackdropFilter:'blur(24px)'}}
        onClick={e=>e.stopPropagation()}>
        {/* Handle */}
        <div className="flex justify-center pt-3 pb-1"><div className="w-10 h-1 rounded-full bg-slate-700"/></div>
        {/* Header */}
        <div className="px-5 pt-2 pb-3 flex items-start justify-between">
          <div className="flex-1 min-w-0">
            <div className="flex items-center gap-2 mb-1.5 flex-wrap">
              {data.code&&<span className="text-xs font-bold px-2 py-0.5 rounded bg-black border border-slate-700 text-[#60a5fa]" style={{fontFamily:'JetBrains Mono,monospace'}}>{data.code}</span>}
              <span className={`text-xs font-bold px-2 py-0.5 rounded-full border ${accentCls}`}>{data.severity}</span>
            </div>
            <div className="text-white font-bold text-lg leading-tight">{data.title}</div>
          </div>
          <button onClick={onClose} className="ml-3 mt-0.5 w-8 h-8 flex items-center justify-center rounded-xl bg-slate-800 text-gray-500 hover:text-white hover:bg-slate-700 transition-colors flex-shrink-0">
            <IconX size={15}/>
          </button>
        </div>
        <div className="mx-5 h-px bg-slate-800"/>
        {/* Body */}
        <div className="px-5 py-4 space-y-4 max-h-[55vh] overflow-y-auto">
          {/* Fehlermeldung */}
          <div>
            <div className="text-slate-500 text-xs uppercase tracking-wider mb-1.5 font-semibold">Fehlermeldung</div>
            <div className="text-gray-300 text-sm leading-relaxed">{data.message}</div>
            {data.wert&&(
              <div className="mt-2.5 inline-flex items-center gap-2 bg-black border border-slate-800 rounded-lg px-3 py-1.5">
                <span className="text-slate-500 text-xs">Messwert:</span>
                <span className="text-white font-bold text-sm" style={{fontFamily:'JetBrains Mono,monospace'}}>{data.wert}</span>
              </div>
            )}
          </div>
          {/* Ursache */}
          <div>
            <div className="text-slate-500 text-xs uppercase tracking-wider mb-1.5 font-semibold">Mögliche Ursache</div>
            <div className="text-gray-400 text-sm leading-relaxed">{data.ursache}</div>
          </div>
          {/* Lösung */}
          <div className={`rounded-xl p-3.5 border ${solveCls}`}>
            <div className={`text-xs uppercase tracking-wider mb-2 font-semibold`}>Lösungsvorschlag</div>
            <div className="text-gray-300 text-sm leading-relaxed">{data.loesung}</div>
          </div>
          {data.asset&&<div className="text-slate-600 text-xs" style={{fontFamily:'JetBrains Mono,monospace'}}>Asset: {data.asset}</div>}
        </div>
        {/* Actions */}
        <div className="px-5 pb-8 pt-2 flex gap-3">
          <button className={`btn-press flex-1 py-3 rounded-xl font-semibold text-sm text-white transition-all ${btnCls}`}
            onClick={()=>{
              if(data.asset){goToDiagnose(data.asset, data.code);}
              onClose();
            }}>Diagnose öffnen</button>
          <button onClick={onClose} className="btn-press px-5 py-3 rounded-xl border border-slate-700 text-slate-400 text-sm hover:bg-slate-800 transition-colors">Schließen</button>
        </div>
      </div>
    </div>
  );
}

// Maps asset status + type to the relevant circuit section
function getSchaltplanSection(asset){
  if(asset.status==='FEHLER'){
    if(asset.type==='Bagger'||asset.type==='Radlader'||asset.hydraulikDruck<asset.hydraulikMax*0.7)
      return 'hydraulik';
    return 'elektrik';
  }
  if(asset.status==='WARTUNG') return 'wartung';
  return 'gesamt';
}

function AbschlussModal({asset,dauer,onClose,onSubmit}){
  const tagRows=[
    ['Hydraulik geprüft','Druck OK','Druck kritisch','Leckage behoben'],
    ['Sensor getauscht','Pumpe geprüft','Filter gewechselt','Ölwechsel'],
    ['Temperatur OK','Überhitzung','CAN-Bus Fehler','Kalibrierung'],
    ['Folgetermin nötig','Teile bestellt','Dokumentiert','Fotos gemacht'],
  ];
  const defaultSelected=new Set(
    asset.status==='FEHLER'?['Hydraulik geprüft','Sensor getauscht','Folgetermin nötig','Dokumentiert']
    :asset.status==='WARTUNG'?['Hydraulik geprüft','Filter gewechselt','Ölwechsel','Dokumentiert']
    :['Hydraulik geprüft','Druck OK','Dokumentiert']
  );
  const [selected,setSelected]=React.useState(defaultSelected);
  const [notiz,setNotiz]=React.useState('');
  const [aiText,setAiText]=React.useState('');
  const [aiLoading,setAiLoading]=React.useState(false);
  const [submitted,setSubmitted]=React.useState(false);

  function toggle(t){setSelected(prev=>{const s=new Set(prev);s.has(t)?s.delete(t):s.add(t);return s;});}

  function generateAI(){
    setAiLoading(true);
    setAiText('');
    const tags=[...selected].join(', ');
    const statusText=asset.status==='FEHLER'?'Fehler aktiv ('+asset.lastEvent+')':asset.status==='WARTUNG'?'Wartung fällig':'Einsatzbereit';
    const templates=[
      `Einsatz an ${asset.name} (${asset.seriennummer}) abgeschlossen.\n\nDurchgeführte Maßnahmen: ${tags}.\n\nBetriebsstunden bei Einsatz: ${asset.betriebsstunden.toLocaleString('de-DE')} Std. Anlagenstatus bei Übergabe: ${statusText}. Hydraulikdruck nach Abschluss: ${asset.hydraulikDruck} bar (Soll: ${asset.hydraulikMax} bar).${notiz?'\n\nZusätzliche Notiz: '+notiz:''}`,
      `Wartungsprotokoll – ${new Date().toLocaleDateString('de-DE')}\nMaschine: ${asset.name} | SN: ${asset.seriennummer} | Einsatzdauer: ${dauer}\n\nDurchgeführt: ${tags}.\n\nMesswerte: Hydraulikdruck ${asset.hydraulikDruck}/${asset.hydraulikMax} bar · Temperatur ${asset.temperatur}°C · Ölstand ${asset.oelstand}%\nStatus nach Einsatz: ${statusText}.${notiz?'\n\nHinweise: '+notiz:''}`,
    ];
    const chosen=templates[Math.floor(Math.random()*templates.length)];
    // Simulate typing effect
    let i=0;
    const interval=setInterval(()=>{
      i+=3;
      setAiText(chosen.slice(0,i));
      if(i>=chosen.length){clearInterval(interval);setAiLoading(false);}
    },18);

          <div className="space-y-2">
            {tagRows.map((row,i)=>(

              <pre className="text-gray-300 text-xs leading-relaxed whitespace-pre-wrap font-sans">{aiText}

              </pre>
              {!aiLoading&&aiText&&(

}

function AssetDetailView({asset,onBack}){

  React.useEffect(()=>{
    if(!wartungStart) return;
    const t=setInterval(()=>setElapsed(Math.floor((Date.now()-wartungStart)/1000)),1000);
    return()=>clearInterval(t);
  },[wartungStart]);

  function formatElapsed(s){
    const m=Math.floor(s/60),sec=s%60;
    return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  }
  function getDauerLabel(){
    if(!wartungStart) return '–';
    const m=Math.floor(elapsed/60);
    if(m<1) return `${elapsed} Sek.`;
    return `${m} Min. ${elapsed%60} Sek.`;
  }

  if(showWartung) return <WartungshistoriePage asset={asset} onBack={()=>setShowWartung(false)}/>;
  if(showErsatzteile) return <ErsatzteilKatalogPage asset={asset} onBack={()=>setShowErsatzteile(false)}/>;

    WARTUNG:{label:'Wartung fällig',cls:'bg-amber-500/20 text-amber-400 border border-amber-500/40', glow:'glow-amber',dot:'bg-amber-400 status-pulse'},
  };

    <div className="fixed inset-0 z-50 bg-black overflow-y-auto slide-up" style={{fontFamily:'Inter,sans-serif'}}>

// ── LOGIN SCREEN ──────────────────────────────────────────────────────────────
function LoginScreen({onLogin}){
  const [email,setEmail]=React.useState('');
  const [pw,setPw]=React.useState('');
  const [err,setErr]=React.useState('');
  function submit(e){
    e.preventDefault();
    const u=USERS_DB.find(x=>x.email===email.trim()&&x.password===pw);
    if(u){onLogin(u);}else{setErr('E-Mail oder Passwort falsch.');}
  }
  function quickLogin(u){ onLogin(u); }
  const roleColors={
    TECHNIKER:   'border-blue-500/30   bg-blue-500/10   text-blue-300   hover:bg-blue-500/20',
    SERVICELEITER:'border-purple-500/30 bg-purple-500/10 text-purple-300 hover:bg-purple-500/20',
    ADMIN:       'border-amber-500/30  bg-amber-500/10  text-amber-300  hover:bg-amber-500/20',
    CEO:         'border-red-500/30    bg-red-500/10    text-red-300    hover:bg-red-500/20',
  };
  return(
    <div className="min-h-screen flex flex-col items-center justify-center bg-[#0d0d0d] px-4 py-8">
      <div className="bg-[#1a1a1a] border border-[#2a2a2a] rounded-2xl p-8 w-full max-w-sm fade-in">
        <div className="flex flex-col items-center mb-8">
          <img src="img/aslogo.png" style={{width:'52px',height:'52px',objectFit:'contain',borderRadius:'12px'}}/>
          <div className="mt-3 text-white font-bold tracking-widest text-lg">ASSETLOGIC</div>
          <div className="text-gray-500 text-xs mt-1">Asset Management Platform</div>
        </div>

        {/* Demo-Schnellauswahl */}
        <div className="mb-5">
          <div className="text-gray-500 text-xs uppercase tracking-widest mb-3 text-center">Demo — Rolle wählen</div>
          <div className="grid grid-cols-2 gap-2">
            {USERS_DB.map(u=>(
              <button key={u.id} onClick={()=>quickLogin(u)}
                className={`btn-press border rounded-xl px-3 py-3 text-left transition-all ${roleColors[u.role]||'border-gray-700 bg-gray-800 text-gray-300 hover:bg-gray-700'}`}>
                <div className="font-semibold text-sm">{u.name.split(' ')[0]} {u.name.split(' ')[1]?.[0]}.</div>
                <div className="text-xs opacity-70 mt-0.5">{getRoleLabel(u.role)}</div>
              </button>
            ))}
          </div>
        </div>

        {/* Divider */}
        <div className="flex items-center gap-3 mb-5">
          <div className="flex-1 h-px bg-[#2a2a2a]"/>
          <span className="text-gray-600 text-xs">oder manuell</span>
          <div className="flex-1 h-px bg-[#2a2a2a]"/>
        </div>

        <form onSubmit={submit} className="space-y-3">
          <input value={email} onChange={e=>{setEmail(e.target.value);setErr('');}} type="email" placeholder="E-Mail" autoComplete="username"
            className="w-full bg-[#111] border border-[#2a2a2a] rounded-xl px-4 py-3 text-white text-sm focus:outline-none focus:border-[#2979FF] focus:ring-1 focus:ring-[#2979FF]/30"/>
          <input value={pw} onChange={e=>{setPw(e.target.value);setErr('');}} type="password" placeholder="Passwort" autoComplete="current-password"
            className="w-full bg-[#111] border border-[#2a2a2a] rounded-xl px-4 py-3 text-white text-sm focus:outline-none focus:border-[#2979FF] focus:ring-1 focus:ring-[#2979FF]/30"/>
          {err&&<div className="text-red-400 text-xs">{err}</div>}
          <button type="submit" className="btn-press bg-[#2979FF] hover:bg-blue-700 text-white rounded-xl py-3 font-semibold w-full transition-colors text-sm">
            Anmelden
          </button>
        </form>
      </div>
    </div>
  );
}

// ── SCAN FAB (draggable, snap-to-side, position memory) ───────────────────────
function ScanFAB({onPress}){
  const STORAGE_KEY='fieldfix_fab_side';
  const [side,setSide]=React.useState(()=>localStorage.getItem(STORAGE_KEY)||'right');
  const [dragging,setDragging]=React.useState(false);
  const [pulse,setPulse]=React.useState(true);
  const fabRef=React.useRef(null);
  const dragState=React.useRef({active:false,startX:0,startY:0,moved:false});

  // stop pulse after 4s (draw attention on first open, then calm down)
  React.useEffect(()=>{const t=setTimeout(()=>setPulse(false),4000);return()=>clearTimeout(t);},[]);

  function startDrag(e){
    const cx=e.touches?e.touches[0].clientX:e.clientX;
    const cy=e.touches?e.touches[0].clientY:e.clientY;
    dragState.current={active:true,startX:cx,startY:cy,moved:false};
    setDragging(true);
  }
  function onDrag(e){
    if(!dragState.current.active)return;
    const cx=e.touches?e.touches[0].clientX:e.clientX;
    const dx=Math.abs(cx-dragState.current.startX);
    const dy=Math.abs((e.touches?e.touches[0].clientY:e.clientY)-dragState.current.startY);
    if(dx>8||dy>8) dragState.current.moved=true;
    if(dragState.current.moved){
      const newSide=cx<window.innerWidth/2?'left':'right';
      setSide(newSide);
    }
  }
  function endDrag(e){
    if(!dragState.current.active)return;
    dragState.current.active=false;
    setDragging(false);
    if(!dragState.current.moved){
      // it was a tap, not a drag → open scan
      onPress();
    } else {
      // save side preference
      localStorage.setItem(STORAGE_KEY,side);
    }
  }

  const baseStyle={
    position:'fixed',
    bottom:'90px',
    [side==='right'?'right':'left']:'16px',
    zIndex:60,
    width:'72px',
    height:'72px',
    borderRadius:'50%',
    background:'linear-gradient(135deg,#2979FF 0%,#1565c0 100%)',
    border:'none',
    cursor:dragging?'grabbing':'grab',
    display:'flex',alignItems:'center',justifyContent:'center',
    boxShadow:'0 4px 24px rgba(41,121,255,0.55), 0 1px 4px rgba(0,0,0,0.4)',
    transition:dragging?'none':'right 0.3s cubic-bezier(.34,1.56,.64,1), left 0.3s cubic-bezier(.34,1.56,.64,1), box-shadow 0.2s',
    userSelect:'none',
    WebkitUserSelect:'none',
    touchAction:'none',
  };

  return(
    <div style={{position:'fixed',inset:0,pointerEvents:'none',zIndex:60}}>
      {/* pulse ring */}
      {pulse&&(
        <div style={{
          position:'fixed',
          bottom:'90px',
          [side==='right'?'right':'left']:'16px',
          width:'72px',height:'72px',borderRadius:'50%',
          border:'2px solid rgba(41,121,255,0.6)',
          animation:'fabPulse 1.2s ease-out infinite',
          pointerEvents:'none',
          zIndex:59,
        }}/>
      )}
      <button
        ref={fabRef}
        style={{...baseStyle,pointerEvents:'all'}}
        onMouseDown={startDrag}
        onMouseMove={onDrag}
        onMouseUp={endDrag}
        onTouchStart={startDrag}
        onTouchMove={onDrag}
        onTouchEnd={endDrag}
        aria-label="Maschine scannen"
      >
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <rect x="3" y="3" width="5" height="5" rx="1"/><rect x="16" y="3" width="5" height="5" rx="1"/><rect x="3" y="16" width="5" height="5" rx="1"/>
          <line x1="11" y1="3" x2="11" y2="8"/><line x1="3" y1="11" x2="21" y2="11"/><line x1="13" y1="3" x2="21" y2="3"/>
          <line x1="21" y1="8" x2="21" y2="16"/><line x1="13" y1="21" x2="21" y2="21"/><line x1="16" y1="13" x2="16" y2="16"/>
          <rect x="13" y="16" width="4" height="5" rx="1"/>
        </svg>
        {/* drag hint indicator */}
        <div style={{
          position:'absolute',top:'-6px',left:'50%',transform:'translateX(-50%)',
          width:'20px',height:'3px',borderRadius:'2px',background:'rgba(255,255,255,0.3)'
        }}/>
      </button>
      {/* drag hint tooltip (first 4s) */}
      {pulse&&(
        <div style={{
          position:'fixed',
          bottom:'170px',
          [side==='right'?'right':'left']:'8px',
          background:'rgba(30,30,40,0.95)',
          border:'1px solid rgba(41,121,255,0.3)',
          borderRadius:'10px',
          padding:'6px 12px',
          fontSize:'11px',
          color:'#aaa',
          whiteSpace:'nowrap',
          pointerEvents:'none',
          zIndex:61,
          animation:'fadeIn 0.3s ease',
        }}>↔ Ziehen zum Wechseln der Seite</div>
      )}
    </div>
  );
}

      <div className="flex items-center justify-between">
        <div>
          <h2 className="text-white text-xl font-bold tracking-tight">Techniker-Team</h2>
          <p className="text-gray-500 text-sm mt-0.5">Echtzeit-Übersicht aller Feldtechniker</p>
        </div>
        <div className="flex items-center gap-2 px-3 py-1.5 rounded-lg text-xs font-medium"
          style={{background:'rgba(34,197,94,0.1)',border:'1px solid rgba(34,197,94,0.2)',color:'#22c55e'}}>
          <span style={{width:6,height:6,borderRadius:'50%',background:'#22c55e',display:'inline-block',boxShadow:'0 0 6px #22c55e'}}/>
          Live
        </div>
      </div>

      {/* KPI Strip */}
      <div className="grid grid-cols-4 gap-4">
        {kpis.map(k=>(
          <div key={k.label} className="rounded-2xl p-5 flex items-center gap-4"
            style={{background:'#141519',border:'1px solid #1f2128'}}>
            <div className="w-11 h-11 rounded-xl flex items-center justify-center text-xl flex-shrink-0"
              style={{background:k.bg}}>
              {k.icon}
            </div>
            <div>
              <div className="text-2xl font-bold text-white leading-none">{k.value}</div>
              <div className="text-gray-500 text-xs mt-1">{k.label}</div>
            </div>
          </div>
        ))}
      </div>

      {/* Activity bar */}
      <div className="rounded-2xl p-4" style={{background:'#141519',border:'1px solid #1f2128'}}>
        <div className="flex items-center justify-between mb-3">
          <span className="text-gray-400 text-xs uppercase tracking-widest font-semibold">Team-Auslastung</span>
          <span className="text-gray-500 text-xs">{Math.round(counts.aktiv/counts.gesamt*100)}% aktiv</span>
        </div>
        <div className="flex gap-0.5 h-2 rounded-full overflow-hidden">
          {TECHNIKER_DB.map(t=>{
            const m=statusMeta[t.status]||statusMeta.OFFLINE;
            return <div key={t.id} className="flex-1 rounded-full" style={{background:m.color,opacity:t.status==='OFFLINE'?0.3:0.85}}/>;
          })}
        </div>
        <div className="flex gap-4 mt-3">
          {Object.entries(statusMeta).map(([s,m])=>{
            const c=TECHNIKER_DB.filter(t=>t.status===s).length;
            if(!c) return null;
            return <div key={s} className="flex items-center gap-1.5">
              <span className="w-2 h-2 rounded-full" style={{background:m.color}}/>
              <span className="text-gray-500 text-xs">{m.label} ({c})</span>
            </div>;
          })}
        </div>
      </div>

      {/* Technician Cards Grid */}
      <div className="grid grid-cols-2 gap-4">
        {TECHNIKER_DB.map(t=>{
          const m=statusMeta[t.status]||statusMeta.OFFLINE;
          const initials=t.name.split(' ').map(n=>n[0]).join('');
          const openOrders=getTechOrders(t.id);
          return(
            <div key={t.id} className="rounded-2xl p-5 transition-all hover:translate-y-[-2px]"
              style={{background:'#141519',border:`1px solid ${t.status==='AKTIV'?'rgba(34,197,94,0.2)':'#1f2128'}`,
                boxShadow:t.status==='AKTIV'?'0 0 0 0 rgba(34,197,94,0.1)':'none'}}>
              {/* Top row */}
              <div className="flex items-start justify-between mb-4">
                <div className="flex items-center gap-3">
                  {/* Avatar with status ring */}
                  <div className="relative">
                    <div className="w-12 h-12 rounded-2xl flex items-center justify-center text-sm font-bold"
                      style={{background:`linear-gradient(135deg,${m.bg},rgba(99,102,241,0.15))`,
                        border:`2px solid ${m.border}`,color:'white',letterSpacing:'0.05em'}}>
                      {initials}
                    </div>
                    {m.pulse&&<span className="absolute -bottom-0.5 -right-0.5 w-3.5 h-3.5 rounded-full border-2 border-[#0f1115] flex items-center justify-center"
                      style={{background:m.color}}>
                      <span className="w-1.5 h-1.5 rounded-full animate-ping" style={{background:'white',opacity:0.8}}/>
                    </span>}
                    {!m.pulse&&<span className="absolute -bottom-0.5 -right-0.5 w-3.5 h-3.5 rounded-full border-2 border-[#0f1115]"
                      style={{background:m.color}}/>}
                  </div>
                  <div>
                    <div className="text-white font-semibold text-sm leading-tight">{t.name}</div>
                    <div className="text-xs mt-0.5 px-2 py-0.5 rounded-full inline-block"
                      style={{background:'rgba(99,102,241,0.15)',color:'#a5b4fc',fontSize:'10px'}}>
                      {t.role}
                    </div>
                  </div>
                </div>
                {/* Status pill */}
                <div className="text-xs px-2.5 py-1 rounded-full font-medium"
                  style={{background:m.bg,border:`1px solid ${m.border}`,color:m.color}}>
                  {m.label}
                </div>
              </div>

              {/* Divider */}
              <div className="border-t border-desk-border mb-4"/>

              {/* Assignment */}
              <div className="flex items-center gap-2 mb-3">
                <svg className="w-3.5 h-3.5 text-gray-600 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                </svg>
                <span className="text-gray-400 text-xs truncate">
                  {t.assignment !== '–' ? t.assignment : <span className="text-gray-600 italic">Keine Zuweisung</span>}
                </span>
              </div>

              {/* Open orders */}
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-2">
                  <svg className="w-3.5 h-3.5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                  </svg>
                  <span className="text-gray-500 text-xs">Offene Aufträge</span>
                </div>
                <div className="flex items-center gap-1.5">
                  {openOrders.length>0
                    ? <><span className="text-white text-xs font-bold">{openOrders.length}</span>
                        <span className="w-1.5 h-1.5 rounded-full bg-desk-accent animate-pulse"/></>
                    : <span className="text-gray-600 text-xs">–</span>
                  }
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── DESKTOP PAGE: NEWS ────────────────────────────────────────────────────────
function NewsPage(){

    ['v2.4.0','Neues Kanban-Board für Auftragsmanagement eingeführt','10. Mär 2026'],
    ['v2.3.5','Performance-Optimierungen im Asset-Tracking','5. Mär 2026'],
    ['v2.3.0','ERP-Schnittstelle erweitert — SAP-Anbindung verbessert','28. Feb 2026'],

    ['v2.2.0','Techniker-App vollständig überarbeitet','15. Feb 2026'],
  ];
  return(
    <div className="space-y-4 max-w-2xl">
      {items.map(([v,msg,date])=>(
        <div key={v} className="bg-desk-surface border border-desk-border rounded-xl p-5">
          <div className="flex items-center gap-3 mb-2">
            <span className="bg-desk-accent/20 text-desk-accent text-xs font-medium px-2.5 py-0.5 rounded-full border border-desk-accent/30">{v}</span>
            <span className="text-gray-500 text-xs">{date}</span>

// ── DESKTOP PAGE: EINSTELLUNGEN ───────────────────────────────────────────────
function EinstellungenPage(){
  const [n1,sN1]=React.useState(true);
  const [n2,sN2]=React.useState(false);
  const [n3,sN3]=React.useState(true);
  const Toggle=({val,set})=>(
    <button onClick={()=>set(!val)} className={`w-11 h-6 rounded-full toggle-track relative flex-shrink-0 ${val?'bg-desk-accent':'bg-[#2a2a2a]'}`}>
      <div className={`absolute top-0.5 w-5 h-5 bg-white rounded-full shadow transition-all duration-200 ${val?'left-5':'left-0.5'}`}/>
    </button>
  );
  return(
    <div className="space-y-5 max-w-2xl">
      <div className="bg-desk-surface border border-desk-border rounded-xl p-5">
        <div className="text-white font-semibold mb-4">Allgemein</div>
        <div className="space-y-4">
          {[['Unternehmensname','FieldFix GmbH'],['Zeitzone','Europe/Berlin'],['Sprache','Deutsch']].map(([l,v])=>(
            <div key={l} className="flex items-center justify-between">
              <label className="text-gray-400 text-sm">{l}</label>
              <input defaultValue={v} className="bg-desk-base border border-desk-border rounded-lg px-3 py-1.5 text-white text-sm focus:outline-none focus:border-desk-accent w-48"/>
            </div>
          ))}
        </div>
      </div>
      <div className="bg-desk-surface border border-desk-border rounded-xl p-5">
        <div className="text-white font-semibold mb-4">Benachrichtigungen</div>
        <div className="space-y-4">
          {[['Kritische Alarme per E-Mail',n1,sN1],['Wartungserinnerungen',n2,sN2],['Tagesberichte',n3,sN3]].map(([l,v,s])=>(
            <div key={l} className="flex items-center justify-between">
              <span className="text-gray-400 text-sm">{l}</span>
              <Toggle val={v} set={s}/>
            </div>
          ))}
        </div>
      </div>
      <button className="btn-press bg-desk-accent hover:bg-desk-accent-dim text-white font-semibold px-6 py-2.5 rounded-xl text-sm transition-colors">Speichern</button>
    </div>
  );
}

// ── DESKTOP DASHBOARD ─────────────────────────────────────────────────────────
function DesktopDashboard({user,onLogout}){
  const [activePage,setActivePage]=React.useState('dashboard');
  const [orders,setOrders]=useSharedOrders();
  const [showNew,setShowNew]=React.useState(false);
  const [selectedAsset,setSelectedAsset]=React.useState(null);
  if(selectedAsset) return <AssetDetailView asset={selectedAsset} onBack={()=>setSelectedAsset(null)}/>;
  const navItems=[
    ['dashboard','Dashboard',<IconGrid size={18}/>],
    ['assets','Assets',<IconCube size={18}/>],
    ['auftraege','Aufträge',<IconClipboard size={18}/>],
    ['techniker','Techniker',<IconUsers size={18}/>],
    ['news','News',<IconBell size={18}/>],
    ['einstellungen','Einstellungen',<IconGear size={18}/>],
  ];
  const pageTitle={dashboard:'Dashboard',assets:'Asset-Verwaltung',auftraege:'Auftragsmanagement',techniker:'Techniker',news:'News & Updates',einstellungen:'Einstellungen'}[activePage]||'';
  return(
    <div className="bg-desk-base min-h-screen flex font-sans text-white">
      <div className="w-[220px] bg-desk-sidebar border-r border-desk-border fixed left-0 top-0 bottom-0 flex flex-col z-30">
        <button onClick={()=>setActivePage('dashboard')} className="p-5 flex items-center gap-3 border-b border-desk-border w-full hover:bg-white/[0.02] transition-colors">
          <img src="img/aslogo.png" style={{width:'32px',height:'32px',objectFit:'contain',borderRadius:'6px'}}/>
          <span className="font-bold text-white tracking-widest text-sm">ASSETLOGIC</span>
        </button>
        <nav className="flex-1 p-3 space-y-1">
          {navItems.map(([id,label,icon])=>(
            <button key={id} onClick={()=>setActivePage(id)}
              className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-all ${activePage===id?'bg-desk-accent/10 text-desk-accent border-l-2 border-desk-accent pl-[10px]':'text-gray-500 hover:text-gray-300'}`}>
              {icon}{label}
            </button>
          ))}
        </nav>
        <div className="p-4 border-t border-desk-border">
          <div className="flex items-center gap-3">
            <div className="w-8 h-8 rounded-full bg-desk-accent/20 flex items-center justify-center text-desk-accent text-xs font-bold flex-shrink-0">{user.initials}</div>
            <div className="min-w-0 flex-1">
              <div className="text-white text-xs font-medium truncate">{user.name}</div>
              <span className={`text-[10px] px-1.5 py-0.5 rounded-full ${getRoleColor(user.role)}`}>{getRoleLabel(user.role)}</span>
            </div>
          </div>
        </div>
      </div>
      <div className="ml-[220px] flex-1 flex flex-col min-h-screen">
        <div className="h-14 border-b border-desk-border flex items-center px-6 justify-between bg-desk-base/80 backdrop-blur sticky top-0 z-20">
          <div className="text-white font-semibold">{pageTitle}</div>
          <div className="flex items-center gap-3">
            <div className="relative">
              <IconSearch size={14} cls="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500"/>
              <input placeholder="Suchen…" className="bg-desk-surface border border-desk-border rounded-lg pl-8 pr-4 py-1.5 text-white text-sm focus:outline-none focus:border-desk-accent w-48"/>
            </div>
            <button onClick={onLogout} title="Abmelden" className="w-8 h-8 rounded-full bg-desk-accent/20 flex items-center justify-center text-desk-accent text-xs font-bold hover:bg-desk-accent/30 transition-colors">
              {user.initials}
            </button>
          </div>
        </div>
        <div className="flex-1 overflow-y-auto p-6 page-enter" key={activePage}>
          {activePage==='dashboard'&&<DashboardPage onNavigate={setActivePage} onSelectAsset={setSelectedAsset}/>}
          {activePage==='assets'&&<AssetsPage onSelect={setSelectedAsset}/>}
          {activePage==='auftraege'&&<AuftraegePage orders={orders} setOrders={setOrders} showNew={showNew} setShowNew={setShowNew}/>}
          {activePage==='techniker'&&<TechnikerPage/>}
          {activePage==='news'&&<NewsPage/>}
          {activePage==='einstellungen'&&<EinstellungenPage/>}
        </div>
      </div>
    </div>
  );
}

// ── ERROR BOUNDARY ────────────────────────────────────────────────────────────
class ErrorBoundary extends React.Component {
  constructor(props){super(props);this.state={error:null};}
  static getDerivedStateFromError(e){return{error:e};}
  render(){
    if(this.state.error) return(
      <div className="min-h-screen bg-[#0d0d0d] flex items-center justify-center px-4">
        <div className="bg-[#1a1a1a] border border-red-500/30 rounded-2xl p-8 max-w-sm w-full text-center">
          <div className="text-red-400 text-4xl mb-4">⚠</div>
          <div className="text-white font-bold mb-2">Rendering-Fehler</div>
          <div className="text-gray-400 text-sm mb-4">{this.state.error.message}</div>
          <button onClick={()=>this.setState({error:null})} className="bg-[#2979FF] text-white rounded-xl px-6 py-2 text-sm font-semibold">Neu laden</button>
        </div>
      </div>
    );
    return this.props.children;
  }
}

// ── APP ROUTER & ROOT ─────────────────────────────────────────────────────────
function AppRouter({user,onLogout}){
  const forcesMobile=isMobileDevice()||user.role==='TECHNIKER';
  if(forcesMobile)return<MobileApp user={user} onLogout={onLogout}/>;
  return<DesktopDashboard user={user} onLogout={onLogout}/>;
}

function App(){
  const [user,setUser]=React.useState(null);
  const [diagData,setDiagData]=React.useState(null);
  React.useEffect(()=>{_setDiagnostic=setDiagData;return()=>{_setDiagnostic=null;};},[]);
  return(<>
    {user?<AppRouter user={user} onLogout={()=>setUser(null)}/>:<LoginScreen onLogin={setUser}/>}
    <DiagnosticPopup data={diagData} onClose={()=>setDiagData(null)}/>
  </>);
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <ErrorBoundary><App/></ErrorBoundary>
);
</script>
</body>
