<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASSETLOGIC · ECHTZEIT-DASHBOARD</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            neon: {
              green: '#39ff14',
              red: '#ff2d6e',
              yellow: '#ffe600',
              blue: '#00d4ff',
            },
            dark: {
              900: '#0a0a0a',
              800: '#111111',
              700: '#181818',
              600: '#1e1e1e',
              500: '#252525',
              400: '#2e2e2e',
            }
          },
          fontFamily: {
            mono: ['JetBrains Mono', 'Fira Code', 'Consolas', 'monospace'],
          },
          boxShadow: {
            'neon-green': '0 0 8px #39ff14, 0 0 20px rgba(57,255,20,0.25)',
            'neon-red': '0 0 8px #ff2d6e, 0 0 20px rgba(255,45,110,0.25)',
            'neon-yellow': '0 0 8px #ffe600, 0 0 20px rgba(255,230,0,0.25)',
            'neon-blue': '0 0 8px #00d4ff, 0 0 20px rgba(0,212,255,0.25)',
            'card': '0 4px 24px rgba(0,0,0,0.6)',
          }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #0a0a0a; font-family: 'JetBrains Mono', monospace; }
    #root { height: 100%; }

    /* Circuit board background */
    .circuit-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .circuit-bg::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(57,255,20,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(57,255,20,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .circuit-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(circle at 20% 30%, rgba(57,255,20,0.04) 0%, transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(0,212,255,0.03) 0%, transparent 40%),
        radial-gradient(circle at 50% 50%, rgba(255,45,110,0.02) 0%, transparent 60%);
    }

    /* Circuit lines */
    .circuit-lines {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    /* Glassmorphism */
    .glass-card {
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.06);
    }

    /* Neon text glow */
    .text-glow-green { text-shadow: 0 0 8px #39ff14, 0 0 16px rgba(57,255,20,0.4); }
    .text-glow-red { text-shadow: 0 0 8px #ff2d6e, 0 0 16px rgba(255,45,110,0.4); }
    .text-glow-yellow { text-shadow: 0 0 8px #ffe600, 0 0 16px rgba(255,230,0,0.4); }
    .text-glow-blue { text-shadow: 0 0 8px #00d4ff, 0 0 16px rgba(0,212,255,0.4); }

    /* Pulse animation */
    @keyframes pulse-neon {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .pulse-dot { animation: pulse-neon 2s ease-in-out infinite; }

    @keyframes scan-line {
      0% { transform: translateY(-100%); }
      100% { transform: translateY(100vh); }
    }
    .scan-line {
      position: fixed;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(57,255,20,0.15), transparent);
      animation: scan-line 8s linear infinite;
      pointer-events: none;
      z-index: 1;
    }

    @keyframes count-up {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .count-anim { animation: count-up 0.5s ease-out forwards; }

    /* Status bar border glow */
    .border-neon-green { border-color: #39ff14; box-shadow: 0 0 0 1px rgba(57,255,20,0.2); }
    .border-neon-red { border-color: #ff2d6e; box-shadow: 0 0 0 1px rgba(255,45,110,0.2); }
    .border-neon-yellow { border-color: #ffe600; box-shadow: 0 0 0 1px rgba(255,230,0,0.2); }
    .border-neon-blue { border-color: #00d4ff; box-shadow: 0 0 0 1px rgba(0,212,255,0.2); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    /* Progress bar shine */
    @keyframes progress-shine {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
    .progress-shine {
      background-size: 200% auto;
      animation: progress-shine 3s linear infinite;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    // =============================================
    // MOCK DATA — Replace with API calls as needed
    // =============================================

    const MOCK_KPI = {
      aktiveFehler: { value: 3, max: 10, delta: '+1 heute', critical: true },
      wartungFaellig: { value: 7, max: 20, delta: '2 überfällig', warning: true },
      assetsErfasst: { value: 142, max: 150, delta: '95% Abdeckung', ok: true },
      erpSync: { value: 98, max: 100, unit: '%', delta: 'Letzte Sync: 14:22', ok: true },
    };

    const MOCK_ASSETS = [
      {
        id: 'BGG-001',
        name: 'Bagger CAT 320',
        location: 'Halle A · Stellplatz 3',
        status: 'ERROR',
        statusLabel: 'FEHLER',
        lastEvent: 'Hydraulikdruck kritisch',
        lastSeen: '3 min',
        uptime: 34,
        metrics: { temp: '94°C', druck: '180 bar', betrieb: '34%' },
      },
      {
        id: 'HP-500',
        name: 'Hydraulikpresse HP-500',
        location: 'Halle B · Linie 2',
        status: 'WARNING',
        statusLabel: 'WARTUNG',
        lastEvent: 'Ölwechsel fällig',
        lastSeen: '12 min',
        uptime: 78,
        metrics: { temp: '72°C', druck: '210 bar', betrieb: '78%' },
      },
      {
        id: 'KPD-200',
        name: 'Kompressor KPD-200',
        location: 'Außenlager · Nord',
        status: 'OK',
        statusLabel: 'AKTIV',
        lastEvent: 'Normalbetrieb',
        lastSeen: '1 min',
        uptime: 96,
        metrics: { temp: '58°C', druck: '8.4 bar', betrieb: '96%' },
      },
      {
        id: 'KR-50',
        name: 'Kran KR-50',
        location: 'Halle C · Deckenkran',
        status: 'OK',
        statusLabel: 'STANDBY',
        lastEvent: 'Bereit',
        lastSeen: '8 min',
        uptime: 100,
        metrics: { temp: '41°C', last: '0 kg', betrieb: '100%' },
      },
    ];

    const MOCK_ALERTS = [
      { id: 1, time: '14:38', asset: 'BGG-001', msg: 'Hydraulikdruck unter Grenzwert', level: 'ERROR' },
      { id: 2, time: '14:22', asset: 'HP-500', msg: 'Wartungsintervall überschritten', level: 'WARNING' },
      { id: 3, time: '13:55', asset: 'BGG-001', msg: 'Temperatur Warnschwelle erreicht', level: 'WARNING' },
      { id: 4, time: '13:01', asset: 'KPD-200', msg: 'ERP-Sync erfolgreich', level: 'OK' },
      { id: 5, time: '12:44', asset: 'KR-50', msg: 'Tagesinspektion abgeschlossen', level: 'OK' },
    ];

    const MOCK_TECHNICIANS = [
      { id: 1, name: 'M. Schulz', status: 'IM EINSATZ', asset: 'BGG-001', since: '13:45' },
      { id: 2, name: 'J. Fischer', status: 'IM EINSATZ', asset: 'HP-500', since: '14:10' },
      { id: 3, name: 'A. Weber', status: 'VERFÜGBAR', asset: null, since: null },
      { id: 4, name: 'K. Müller', status: 'PAUSE', asset: null, since: '14:20' },
    ];

    // =============================================
    // COMPONENTS
    // =============================================

    function CircuitBackground() {
      return (
        <>
          <div className="circuit-bg" />
          <div className="scan-line" />
          <svg className="circuit-lines" xmlns="http://www.w3.org/2000/svg">
            <line x1="0" y1="30%" x2="100%" y2="30%" stroke="rgba(57,255,20,0.04)" strokeWidth="1"/>
            <line x1="0" y1="70%" x2="100%" y2="70%" stroke="rgba(0,212,255,0.03)" strokeWidth="1"/>
            <line x1="25%" y1="0" x2="25%" y2="100%" stroke="rgba(57,255,20,0.03)" strokeWidth="1"/>
            <line x1="75%" y1="0" x2="75%" y2="100%" stroke="rgba(0,212,255,0.03)" strokeWidth="1"/>
            {/* Circuit nodes */}
            <circle cx="25%" cy="30%" r="3" fill="rgba(57,255,20,0.15)"/>
            <circle cx="75%" cy="70%" r="3" fill="rgba(0,212,255,0.12)"/>
            <circle cx="75%" cy="30%" r="2" fill="rgba(255,230,0,0.1)"/>
            <circle cx="25%" cy="70%" r="2" fill="rgba(255,45,110,0.1)"/>
          </svg>
        </>
      );
    }

    function StatusDot({ status, pulse = false }) {
      const colorMap = {
        ERROR: 'bg-neon-red shadow-neon-red',
        WARNING: 'bg-neon-yellow shadow-neon-yellow',
        OK: 'bg-neon-green shadow-neon-green',
        STANDBY: 'bg-neon-blue shadow-neon-blue',
      };
      return (
        <span
          className={`inline-block w-2 h-2 rounded-full ${colorMap[status] || 'bg-gray-500'} ${pulse ? 'pulse-dot' : ''}`}
          style={{ boxShadow: status === 'ERROR' ? '0 0 6px #ff2d6e' : status === 'OK' ? '0 0 6px #39ff14' : status === 'WARNING' ? '0 0 6px #ffe600' : '0 0 6px #00d4ff' }}
        />
      );
    }

    function KpiCard({ label, value, unit = '', max, delta, color, icon, progress }) {
      const colorConfig = {
        red: {
          border: 'border-neon-red',
          text: 'text-neon-red text-glow-red',
          bar: 'bg-neon-red',
          barGlow: '#ff2d6e',
          bg: 'rgba(255,45,110,0.05)',
          icon: 'rgba(255,45,110,0.15)',
        },
        yellow: {
          border: 'border-neon-yellow',
          text: 'text-neon-yellow text-glow-yellow',
          bar: 'bg-neon-yellow',
          barGlow: '#ffe600',
          bg: 'rgba(255,230,0,0.05)',
          icon: 'rgba(255,230,0,0.15)',
        },
        green: {
          border: 'border-neon-green',
          text: 'text-neon-green text-glow-green',
          bar: 'bg-neon-green',
          barGlow: '#39ff14',
          bg: 'rgba(57,255,20,0.05)',
          icon: 'rgba(57,255,20,0.15)',
        },
        blue: {
          border: 'border-neon-blue',
          text: 'text-neon-blue text-glow-blue',
          bar: 'bg-neon-blue',
          barGlow: '#00d4ff',
          bg: 'rgba(0,212,255,0.05)',
          icon: 'rgba(0,212,255,0.15)',
        },
      };
      const cfg = colorConfig[color] || colorConfig.blue;
      const pct = max ? Math.min(100, Math.round((value / max) * 100)) : progress || 0;

      return (
        <div
          className={`glass-card rounded-xl p-5 border-l-2 ${cfg.border} relative overflow-hidden`}
          style={{ background: cfg.bg }}
        >
          {/* Top row */}
          <div className="flex items-start justify-between mb-3">
            <div
              className="w-10 h-10 rounded-lg flex items-center justify-center text-lg"
              style={{ background: cfg.icon }}
            >
              {icon}
            </div>
            <div className="text-right">
              <div className={`text-3xl font-black ${cfg.text} count-anim`} style={{ letterSpacing: '-1px' }}>
                {value}<span className="text-base font-normal ml-0.5 opacity-70">{unit}</span>
              </div>
            </div>
          </div>

          {/* Label */}
          <div className="text-xs font-semibold tracking-widest text-gray-400 uppercase mb-3">{label}</div>

          {/* Progress bar */}
          <div className="h-1 bg-white/5 rounded-full overflow-hidden mb-2">
            <div
              className={`h-full rounded-full transition-all duration-700`}
              style={{
                width: `${pct}%`,
                background: `linear-gradient(90deg, ${cfg.barGlow}aa, ${cfg.barGlow})`,
                boxShadow: `0 0 6px ${cfg.barGlow}`,
              }}
            />
          </div>

          {/* Delta */}
          <div className="text-xs text-gray-500 font-mono">{delta}</div>
        </div>
      );
    }

    function AssetCard({ asset }) {
      const colorConfig = {
        ERROR: {
          border: 'border-neon-red',
          glow: 'rgba(255,45,110,0.12)',
          label: 'text-neon-red',
          barColor: '#ff2d6e',
          status: 'ERROR',
        },
        WARNING: {
          border: 'border-neon-yellow',
          glow: 'rgba(255,230,0,0.08)',
          label: 'text-neon-yellow',
          barColor: '#ffe600',
          status: 'WARNING',
        },
        OK: {
          border: 'border-neon-green',
          glow: 'rgba(57,255,20,0.06)',
          label: 'text-neon-green',
          barColor: '#39ff14',
          status: 'OK',
        },
        STANDBY: {
          border: 'border-neon-blue',
          glow: 'rgba(0,212,255,0.06)',
          label: 'text-neon-blue',
          barColor: '#00d4ff',
          status: 'OK',
        },
      };
      const cfg = colorConfig[asset.status] || colorConfig.OK;

      return (
        <div
          className={`glass-card rounded-xl p-5 border ${cfg.border} relative overflow-hidden cursor-pointer
            transition-all duration-200 hover:scale-[1.01]`}
          style={{ background: cfg.glow }}
        >
          {/* Header */}
          <div className="flex items-start justify-between mb-4">
            <div>
              <div className="flex items-center gap-2 mb-1">
                <StatusDot status={asset.status} pulse={asset.status === 'ERROR'} />
                <span className={`text-xs font-bold tracking-widest ${cfg.label}`}>{asset.statusLabel}</span>
              </div>
              <h3 className="text-white font-bold text-base leading-tight">{asset.name}</h3>
              <p className="text-gray-500 text-xs mt-0.5 font-mono">{asset.location}</p>
            </div>
            <div className="text-right">
              <div className="text-xs text-gray-600 font-mono mb-1">{asset.id}</div>
              <div className="text-xs text-gray-500">{asset.lastSeen}</div>
            </div>
          </div>

          {/* Last event */}
          <div className="bg-white/[0.03] rounded-lg px-3 py-2 mb-4 border border-white/5">
            <span className="text-xs text-gray-500 font-mono">EVENT · </span>
            <span className="text-xs text-gray-300 font-mono">{asset.lastEvent}</span>
          </div>

          {/* Metrics */}
          <div className="grid grid-cols-3 gap-2 mb-4">
            {Object.entries(asset.metrics).map(([key, val]) => (
              <div key={key} className="text-center">
                <div className="text-gray-500 text-xs uppercase tracking-wider mb-0.5">{key}</div>
                <div className="text-white text-xs font-bold font-mono">{val}</div>
              </div>
            ))}
          </div>

          {/* Uptime bar */}
          <div>
            <div className="flex justify-between text-xs text-gray-600 mb-1.5 font-mono">
              <span>AUSLASTUNG</span>
              <span>{asset.uptime}%</span>
            </div>
            <div className="h-1.5 bg-white/5 rounded-full overflow-hidden">
              <div
                className="h-full rounded-full transition-all duration-700"
                style={{
                  width: `${asset.uptime}%`,
                  background: `linear-gradient(90deg, ${cfg.barColor}88, ${cfg.barColor})`,
                  boxShadow: `0 0 6px ${cfg.barColor}`,
                }}
              />
            </div>
          </div>
        </div>
      );
    }

    function AlertRow({ alert }) {
      const colorMap = {
        ERROR: { dot: 'bg-neon-red', text: 'text-neon-red' },
        WARNING: { dot: 'bg-neon-yellow', text: 'text-neon-yellow' },
        OK: { dot: 'bg-neon-green', text: 'text-neon-green' },
      };
      const cfg = colorMap[alert.level] || colorMap.OK;

      return (
        <div className="flex items-center gap-3 py-2.5 border-b border-white/[0.04] last:border-0 group hover:bg-white/[0.02] px-2 rounded-lg -mx-2 transition-colors">
          <span
            className={`w-1.5 h-1.5 rounded-full flex-shrink-0 ${cfg.dot} ${alert.level === 'ERROR' ? 'pulse-dot' : ''}`}
            style={{ boxShadow: alert.level === 'ERROR' ? '0 0 4px #ff2d6e' : alert.level === 'OK' ? '0 0 4px #39ff14' : '0 0 4px #ffe600' }}
          />
          <span className="text-gray-600 font-mono text-xs w-10 flex-shrink-0">{alert.time}</span>
          <span className={`font-mono text-xs w-16 flex-shrink-0 ${cfg.text}`}>{alert.asset}</span>
          <span className="text-gray-400 text-xs flex-1 truncate font-mono">{alert.msg}</span>
        </div>
      );
    }

    function TechRow({ tech }) {
      const statusConfig = {
        'IM EINSATZ': { dot: 'bg-neon-green', text: 'text-neon-green' },
        'VERFÜGBAR': { dot: 'bg-neon-blue', text: 'text-neon-blue' },
        'PAUSE': { dot: 'bg-neon-yellow', text: 'text-neon-yellow' },
      };
      const cfg = statusConfig[tech.status] || statusConfig['VERFÜGBAR'];

      return (
        <div className="flex items-center gap-3 py-2.5 border-b border-white/[0.04] last:border-0">
          <div className="w-7 h-7 rounded-full bg-white/5 border border-white/10 flex items-center justify-center text-xs text-gray-400 flex-shrink-0 font-mono">
            {tech.name.split(' ').map(n => n[0]).join('')}
          </div>
          <div className="flex-1 min-w-0">
            <div className="text-gray-300 text-xs font-bold truncate">{tech.name}</div>
            {tech.asset && <div className="text-gray-600 text-xs font-mono">{tech.asset} · {tech.since}</div>}
          </div>
          <span className={`text-xs font-bold font-mono ${cfg.text}`}>{tech.status}</span>
        </div>
      );
    }

    function LiveClock() {
      const [time, setTime] = React.useState(new Date());
      React.useEffect(() => {
        const t = setInterval(() => setTime(new Date()), 1000);
        return () => clearInterval(t);
      }, []);
      const pad = n => n < 10 ? '0' + n : '' + n;
      return (
        <div className="font-mono">
          <span className="text-neon-green text-glow-green text-2xl font-black tabular-nums">
            {pad(time.getHours())}:{pad(time.getMinutes())}
          </span>
          <span className="text-green-700 text-sm ml-1">:{pad(time.getSeconds())}</span>
        </div>
      );
    }

    function Dashboard() {
      const [activeAsset, setActiveAsset] = React.useState(null);
      const errorCount = MOCK_ASSETS.filter(a => a.status === 'ERROR').length;
      const warningCount = MOCK_ASSETS.filter(a => a.status === 'WARNING').length;
      const now = new Date();
      const dateStr = now.toLocaleDateString('de-DE', { weekday: 'long', day: '2-digit', month: 'long', year: 'numeric' });

      return (
        <div className="relative min-h-screen bg-dark-900 overflow-x-hidden">
          <CircuitBackground />

          <div className="relative z-10 flex flex-col min-h-screen">

            {/* ── HEADER ── */}
            <header className="glass-card border-b border-white/[0.06] px-6 py-4 flex items-center justify-between flex-shrink-0">
              <div className="flex items-center gap-4">
                {/* Logo */}
                <div className="relative">
                  <div className="w-10 h-10 rounded-lg bg-neon-green/10 border border-neon-green/30 flex items-center justify-center"
                    style={{ boxShadow: '0 0 12px rgba(57,255,20,0.2)' }}>
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                      <rect x="2" y="2" width="7" height="7" rx="1" fill="#39ff14" opacity="0.9"/>
                      <rect x="11" y="2" width="7" height="7" rx="1" fill="#39ff14" opacity="0.5"/>
                      <rect x="2" y="11" width="7" height="7" rx="1" fill="#39ff14" opacity="0.5"/>
                      <rect x="11" y="11" width="7" height="7" rx="1" fill="#39ff14" opacity="0.3"/>
                    </svg>
                  </div>
                </div>
                <div>
                  <div className="flex items-center gap-2">
                    <h1 className="text-white font-black text-base tracking-[0.15em] uppercase">
                      ASSETLOGIC
                    </h1>
                    <span className="text-neon-green/40 text-base">·</span>
                    <span className="text-gray-400 font-light text-sm tracking-[0.12em] uppercase">
                      ECHTZEIT-DASHBOARD
                    </span>
                  </div>
                  <p className="text-gray-600 text-xs font-mono mt-0.5 tracking-wider">
                    Asset-Monitoring & Predictive Maintenance
                  </p>
                </div>
              </div>

              <div className="flex items-center gap-6">
                {/* Status indicator */}
                <div className="flex items-center gap-2">
                  <span className="w-1.5 h-1.5 rounded-full bg-neon-green pulse-dot" style={{ boxShadow: '0 0 6px #39ff14' }} />
                  <span className="text-xs text-gray-500 font-mono tracking-wider">LIVE</span>
                </div>

                {/* Clock */}
                <LiveClock />

                {/* Date */}
                <div className="text-xs text-gray-600 font-mono hidden lg:block">{dateStr}</div>
              </div>
            </header>

            {/* ── KPI STRIP ── */}
            <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 px-6 py-4 flex-shrink-0">
              <KpiCard
                label="Aktive Fehler"
                value={MOCK_KPI.aktiveFehler.value}
                max={MOCK_KPI.aktiveFehler.max}
                delta={MOCK_KPI.aktiveFehler.delta}
                color="red"
                icon="⚠"
              />
              <KpiCard
                label="Wartung fällig"
                value={MOCK_KPI.wartungFaellig.value}
                max={MOCK_KPI.wartungFaellig.max}
                delta={MOCK_KPI.wartungFaellig.delta}
                color="yellow"
                icon="🔧"
              />
              <KpiCard
                label="Assets erfasst"
                value={MOCK_KPI.assetsErfasst.value}
                max={MOCK_KPI.assetsErfasst.max}
                delta={MOCK_KPI.assetsErfasst.delta}
                color="green"
                icon="📦"
              />
              <KpiCard
                label="ERP-Sync"
                value={MOCK_KPI.erpSync.value}
                unit="%"
                progress={MOCK_KPI.erpSync.value}
                delta={MOCK_KPI.erpSync.delta}
                color="blue"
                icon="🔄"
              />
            </div>

            {/* ── MAIN BODY ── */}
            <div className="flex-1 grid grid-cols-1 lg:grid-cols-3 gap-4 px-6 pb-6 overflow-hidden">

              {/* Left: Asset Cards */}
              <div className="lg:col-span-2 overflow-y-auto">
                <div className="flex items-center justify-between mb-3">
                  <h2 className="text-xs font-bold text-gray-500 tracking-widest uppercase">
                    Asset-Status · {MOCK_ASSETS.length} Einheiten
                  </h2>
                  <div className="flex items-center gap-3">
                    <span className="flex items-center gap-1.5 text-xs text-neon-red font-mono">
                      <StatusDot status="ERROR" pulse /> {errorCount} Fehler
                    </span>
                    <span className="flex items-center gap-1.5 text-xs text-neon-yellow font-mono">
                      <StatusDot status="WARNING" /> {warningCount} Warnungen
                    </span>
                  </div>
                </div>
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                  {MOCK_ASSETS.map(asset => (
                    <AssetCard key={asset.id} asset={asset} />
                  ))}
                </div>
              </div>

              {/* Right: Sidebar panels */}
              <div className="flex flex-col gap-4 overflow-hidden">

                {/* Alert log */}
                <div className="glass-card rounded-xl p-4 flex-1 overflow-hidden flex flex-col" style={{ minHeight: 0 }}>
                  <div className="flex items-center justify-between mb-3 flex-shrink-0">
                    <h2 className="text-xs font-bold text-gray-500 tracking-widest uppercase">
                      Event-Log
                    </h2>
                    <span className="text-xs text-neon-red font-mono pulse-dot">● LIVE</span>
                  </div>
                  <div className="overflow-y-auto flex-1">
                    {MOCK_ALERTS.map(alert => (
                      <AlertRow key={alert.id} alert={alert} />
                    ))}
                  </div>
                </div>

                {/* Technician panel */}
                <div className="glass-card rounded-xl p-4 flex-shrink-0">
                  <div className="flex items-center justify-between mb-3">
                    <h2 className="text-xs font-bold text-gray-500 tracking-widest uppercase">
                      Techniker
                    </h2>
                    <span className="text-xs text-neon-blue font-mono">
                      {MOCK_TECHNICIANS.filter(t => t.status === 'IM EINSATZ').length} im Einsatz
                    </span>
                  </div>
                  {MOCK_TECHNICIANS.map(tech => (
                    <TechRow key={tech.id} tech={tech} />
                  ))}
                </div>

                {/* System status */}
                <div className="glass-card rounded-xl p-4 flex-shrink-0">
                  <h2 className="text-xs font-bold text-gray-500 tracking-widest uppercase mb-3">
                    System-Status
                  </h2>
                  <div className="space-y-2">
                    {[
                      { label: 'API-Gateway', status: 'OK', val: '12ms' },
                      { label: 'ERP-Connector', status: 'OK', val: 'Online' },
                      { label: 'Datenbank', status: 'OK', val: '99.9%' },
                      { label: 'IoT-Broker', status: 'WARNING', val: '3 offline' },
                    ].map(item => (
                      <div key={item.label} className="flex items-center justify-between">
                        <div className="flex items-center gap-2">
                          <StatusDot status={item.status} />
                          <span className="text-gray-400 text-xs font-mono">{item.label}</span>
                        </div>
                        <span className={`text-xs font-mono font-bold ${
                          item.status === 'OK' ? 'text-neon-green' :
                          item.status === 'WARNING' ? 'text-neon-yellow' : 'text-neon-red'
                        }`}>{item.val}</span>
                      </div>
                    ))}
                  </div>
                </div>

              </div>
            </div>

          </div>
        </div>
      );
    }

    // =============================================
    // RENDER
    // =============================================
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Dashboard />);
  </script>
</body>
</html>
